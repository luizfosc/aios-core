    url: "guiavila.com/blog/..."
    category: "PalestrasCorporativas"
    summary: >
      Após anos como empreendedor, ilusionista e palestrante, descobriu que
      não existe fórmula mágica pro sucesso. O que existe é algo muito mais
      acessível e prático.
    voice_pattern: "Desmistificação (destruir o mito do gênio)"

  - title: "O Maior Segredo da Mágica: 5 Insights que Vão Transformar Sua Vida"
    url: "guiavila.com/blog/..."
    category: "PalestrasCorporativas"
    summary: >
      Após 20+ anos de mágica, descobriu que o verdadeiro poder está na forma
      como os ilusionistas pensam. Esse pensamento pode ser aplicado por
      qualquer pessoa.
    voice_pattern: "Transferência de framework (mágica → vida)"

  - title: "O Segredo para Reuniões 10x Mais Produtivas com IA | Tutorial TLDV"
    url: "guiavila.com/blog/o-segredo-para-reunioes-10x-mais-produtivas-com-ia-tutorial-tldv/"
    category: "Produtividade"
    summary: >
      Tutorial prático sobre TLDV para gravar, transcrever e analisar reuniões
      com IA. Começou a usar e ficou impressionado. Compara a ter um assistente
      pessoal cuidando de tudo.
    voice_pattern: "Tutorial prático (passo-a-passo gratuito)"

  - title: "Descubra o Poder do ClickUp"
    url: "guiavila.com/blog/descubra-o-poder-do-clickup/"
    category: "Produtividade"
    summary: >
      Em evento de marketing em São Paulo, apresentou ClickUp para pessoas que
      iam gastar fortunas criando plataforma do zero. Ferramenta gratuita que
      centraliza tudo.
    voice_pattern: "Storytelling de evento real + solução prática"

  - title: "Utilize esta ferramenta para otimizar seu tempo com vídeos"
    url: "guiavila.com/blog/utilize-esta-ferramenta-para-otimizar-seu-tempo-com-videos/"
    category: "Produtividade"
    summary: >
      Frustração pessoal levou a descobrir ferramenta para controlar velocidade
      de vídeos. 300 palavras/min leitura vs 150 palavras/min fala = ajuste
      essencial.
    voice_pattern: "Problema pessoal → solução universal"

  - title: "Essas 2 coisas me impediam de começar no Youtube"
    url: "guiavila.com/blog/..."
    category: "Desenvolvimento Pessoal"
    summary: >
      Vulnerabilidade: adiou projeto dos sonhos por barreiras psicológicas.
      Documenta o primeiro passo na jornada que vinha adiando.
    voice_pattern: "Vulnerabilidade controlada (eu também sinto isso)"

  - title: "A Área de Membros que vai Vender seu Infoproduto como Mágica"
    url: "guiavila.com/blog/a-area-de-membros-que-vai-vender-seu-infoproduto-como-magica/"
    category: "Ensinio"
    summary: >
      Showcase da Ensinio: experiência Netflix para cursos, app próprio na
      Play Store/App Store, gamificação, comunidade exclusiva. Foco em LTV e
      experiência visual.
    voice_pattern: "Product-led storytelling (usa próprio produto como exemplo)"

