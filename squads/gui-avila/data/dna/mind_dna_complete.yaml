        - { objection: "Sem dinheiro", response: "Quanto perde sem automação? 20h/mês × R$100 = R$2000", tone: "educational" }
        - { objection: "Meu negócio é diferente", response: "Sistemas são universais", tone: "educational" }
        - { objection: "Não sou técnico", response: "Eu sou mágico, aprendi. Você também consegue.", tone: "educational" }
        - { objection: "Vou contratar alguém", response: "Precisa entender o sistema primeiro", tone: "educational" }
      pushback_triggers:
        - { trigger: "Quer resultado sem esforço", response: "Não é meu cliente" }
        - { trigger: "Questiona preço sem entender valor", response: "Não entendeu ainda" }
        - { trigger: "Quer custom quando SaaS resolve", response: "99% das vezes SaaS resolve" }
      style:
