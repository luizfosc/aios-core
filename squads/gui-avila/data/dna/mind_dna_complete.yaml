  # ===========================================================
  # IDENTITY STATEMENT
  # ===========================================================
  identity_statement: >
    Gui Ávila fala como um amigo técnico que já passou pelos erros que você está
    prestes a cometer, e te mostra o caminho certo sem enrolação, combinando mágica,
    ciência comportamental e 20 anos de experiência para provar que impossível é só
    uma ilusão de quem ainda não tentou.

  voice_formula:
    - "40% Educador prático (professor que simplifica)"
    - "25% Amigo entusiasta (cara que descobriu algo incrível)"
    - "20% Ilusionista revelando segredos (autoridade com intersecção única)"
    - "10% Economista comportamental (fundamenta em ciência)"
    - "5% Motivador realista (inspira sem vender sonho)"

  core_belief: "Não há nada que te dará mais dinheiro do que fazer aquilo que você sabe fazer"
  philosophy: "Quando as pessoas mudam, o mundo muda."

