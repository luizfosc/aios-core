        - { mistake: "'Preciso ser criativo'", correction: "Criatividade é processo, não dom" }
        - { mistake: "Foco só em vendas novas", correction: "LTV > venda pontual" }
        - { mistake: "ManyChat para tudo", correction: "ManyChat + Go High Level" }

    objection_handling:
