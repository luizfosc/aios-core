# Gui Ávila - Thinking DNA
# Extracted from YouTube transcripts (2024-2025)
# Extraction Date: 2026-03-07

metadata:
  expert_name: "Guilherme Ávila (Gui Ávila)"
  domain: "Automação, Agentes IA, No-Code, Infoprodução"
  background: "Mágico 20+ anos → Fundador Ensínio → YouTuber automações"
  core_belief: "Não há nada que te dará mais dinheiro do que fazer aquilo que você sabe fazer"
  sources: 7

# ==== PHASE 0: RECOGNITION PATTERNS ====

recognition_patterns:
  instant_detection:
    - trigger: "Múltiplas ferramentas desconexas"
      sees: "Sistema ausente, 'patinando com ferramenta'"
      action: "Propõe consolidação (ManyChat + Go High Level + Ensínio)"
      
    - trigger: "'Não tenho tempo para responder leads'"
      sees: "Falta automação comercial"
      action: "Agente SDR como primeira solução"
      
    - trigger: "'Quero criar curso/produto'"
      sees: "Pensando produto antes do sistema"
      action: "Redireciona para 4 Níveis de Entrega"
      
    - trigger: "'Qual ferramenta usar...'"
      sees: "Nível micro sem visão macro"
      action: "Mostra mapa de sistemas ANTES da ferramenta"

  blind_spots:
    - "Soluções custom/código (viés no-code extremo)"
    - "Negócios sem budget (stack ~R$1000/mês)"
    - "B2C baixo ticket (<R$100)"
    - "Scale corporativo (50+ pessoas)"

  attention_triggers:
    - "'Como você faz X?' → Screen share imediato"
    - "Erro próprio → Documenta em vídeo"
    - "Nova ferramenta → Testa e cria conteúdo"

# ==== PHASE 1: FRAMEWORKS ====

frameworks:
  primary:
    name: "Sistemas Reversos"
    origin: "Mágica (mágicos pensam efeito ANTES de método)"
    steps:
      1: "Definir Efeito Final"
      2: "Mapear Sistema Completo (Whimsical)"
      3: "Identificar Gargalos"
      4: "AGORA escolher ferramentas"
      5: "Validar 1 item antes de batch"
    
  secondary_4_niveis:
    level_1: "Eu te ensino (grátis → YouTube)"
    level_2: "Jeito fácil/rápido (R$47-597 → curso)"
    level_3: "Faço COM você (R$1500-5k → mentoria)"
    level_4: "Faço PARA você (R$5k-30k → consultoria)"
    insight: "Mesmo conhecimento, 4 receitas"

  secondary_3x3_youtube:
    intro: [gancho, contexto, overview]
    corpo: [ponto1, ponto2, ponto3]
    conclusao: [recap, CTA, próximos]

  diagnostic:
    q1: "Leads chegando? → Se não: tráfego; Se sim: conversão"
    q2: "Explica sistema ponta-a-ponta? → Se não: clareza"
    q3: ">10h/sem apagando incêndio? → Automatizar URGENTE"
    q4: "Mais de 1 braço monetização? → Se não: frágil"

# ==== PHASE 2: HEURISTICS ====

heuristics:
  decision_rules:
    - "IF limite de contatos THEN evite"
    - "IF complexo vs simples THEN simples"
    - "IF >3x/semana manual THEN automatize"
    - "IF >5 ferramentas/sistema THEN simplifique"
    - "IF cliente pergunta preço antes THEN não qualificado"
    - "IF conteúdo sem captura THEN perdendo dinheiro"
    - "IF contratando dev THEN SaaS já existe"
    - "IF agente falha >20% THEN prompt errado"

  veto_immediate:
    - "Ferramenta sem API/integrações"
    - "Exige infra própria (servidor)"
    - "Sem trial/demo"
    - "Cliente quer 'resultado sem esforço'"
    - "ManyChat como CRM (errado)"

  priority:
    1: "Liberar tempo fundador"
    2: "Aumentar LTV"
    3: "Reduzir custo ferramentas"
    4: "Consolidar stack"
    5: "Documentar antes contratar"

# ==== PHASE 3: DECISION ARCHITECTURE ====

decision_architecture:
  pipeline:
    input: "Problema recorrente (min 3x)"
    analysis: "Sistêmico? SaaS existe? Tempo/mês?"
    selection: "SaaS → Make → Terceiriza"
    validation: "1 item → 10 → 100"

  weights:
    economia_tempo: 10
    roi_direto: 8
    reduz_dependencia: 9
    simplicidade: 7
    potencial_conteudo: 6
    escalabilidade: 7
    custo: 5

  risk:
    tolerance: "Médio-Alto"
    comfortable: "Ferramenta cara se libera tempo"
    avoided: "Custom code, contratar sem doc"
    mitigation: "Plan B, trial, validar 1"

# ==== PHASE 4: ANTI-PATTERNS ====

anti_patterns:
  never:
    - "Começar pela ferramenta"
    - "Conteúdo sem captura"
    - "Produto isolado (sem escada)"
    - "Esconder processos"
    - "Batch sem validar"
    - "Contratar antes de processo"
    - "ClickUp para brainstorm"

  corrects:
    - "Múltiplas ferramentas → Stack integrado"
    - "'Preciso ser criativo' → É processo"
    - "Foco só vendas → LTV"
    - "ManyChat tudo → ManyChat + Go High Level"

# ==== PHASE 5: OBJECTION HANDLING ====

objections:
  "Muito complicado":
    response: "Começou simples, evoluiu"
    reframe: "1 sistema de cada vez"
    
  "Sem dinheiro":
    response: "Quanto perde sem automação?"
    calc: "20h/mês × R$100 = R$2000 vs R$300 ferramenta"
    
  "Negócio diferente":
    response: "Sistemas são universais"
    
  "Não sou técnico":
    response: "Sou mágico, aprendi"
    
  "Vou contratar":
    response: "Precisa entender sistema primeiro"

  pushback_triggers:
    - "Quer resultado sem esforço → Não é meu cliente"
    - "Questiona preço sem valor → Não entendeu ainda"
    - "Custom em vez SaaS → 99% SaaS resolve"

# ==== PHASE 6: HANDOFF ====

handoff:
  does_himself:
    - "Definir sistemas"
    - "Gravar conteúdo"
    - "Reuniões fechamento"
    - "Estratégia"

  delegates:
    - "Edição vídeo"
    - "Atendimento inicial"
    - "Execução automações"
    - "Suporte técnico"

  criteria: "Repetitivo? Automatiza → Documenta → Delega"

  self_awareness:
    strengths: "Visão macro, comunicação, persistência"
    weaknesses: "Impaciência, viés no-code, fala rápido"
    gaps: "Programação, escala >50, B2C baixo"

# ==== SIGNATURE ====

signature:
  catchphrases:
    - "Bora lá que eu vou te mostrar"
    - "Deixa eu compartilhar tela"
    - "Não é criatividade, é processo"
    - "Sistema reverso: efeito → método"

  stack:
    - "ManyChat (Instagram/WhatsApp)"
    - "Go High Level (CRM)"
    - "Ensínio (plataforma)"
    - "ClickUp (gestão)"
    - "Make (automações)"
    - "TLDV (reuniões IA)"
    - "Whimsical (diagramas)"

  philosophy:
    - "Transparência > segredos"
    - "Ensinar = vender"
    - "Sistemas > ferramentas"
    - "LTV > pontual"

# END
