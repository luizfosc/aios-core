# Voice DNA — Gui Ávila
# Extracted from 10 YouTube transcripts + research report
# Date: 2026-03-07

voice_dna:
  metadata:
    subject: "Guilherme Ávila (Gui Ávila)"
    extraction_date: "2026-03-07"
    source_count: 11
    source_types:
      - "YouTube transcripts (7 analyzed)"
      - "Research report (1)"
    confidence_level: "HIGH"

  vocabulary:
    power_words:
      - word: "cara"
        frequency: "MUITO ALTA"
        context: "Usado para criar intimidade, como se estivesse conversando com um amigo"
        examples:
          - "Cara, isso aqui tem um potencial enorme"
          - "Cara, olha só que legal"
          - "Cara, sério, vale ouro"

      - word: "olha só"
        frequency: "MUITO ALTA"
        context: "Para capturar atenção antes de mostrar algo importante"
        examples:
          - "Olha só isso aqui, ó"
          - "Então olha só"
          - "Mas olha só que interessante"

      - word: "incrível"
        frequency: "ALTA"
        context: "Expressar admiração genuína por tecnologia ou resultado"
        examples:
          - "Ferramenta incrível"
          - "Isso é incrível"
          - "Olha só que incrível"

      - word: "beleza"
        frequency: "ALTA"
        context: "Confirmação ou transição suave entre tópicos"
        examples:
          - "Beleza? Então bora lá"
          - "Tá beleza, seguindo"

      - word: "mão na roda"
        frequency: "MÉDIA"
        context: "Descrever algo que facilita muito a vida"
        examples:
          - "Essa ferramenta é uma mão na roda"
          - "Isso aqui é mão na roda demais"

      - word: "sério"
        frequency: "ALTA"
        context: "Enfatizar veracidade ou importância"
        examples:
          - "Sério, isso vale ouro"
          - "Eu tô falando sério aqui"
          - "Sério mesmo"

      - word: "massa"
        frequency: "MÉDIA"
        context: "Expressar entusiasmo positivo"
        examples:
          - "Vai ser muito massa"
          - "Que massa isso aqui"

      - word: "Meu Deus do céu"
        frequency: "BAIXA"
        context: "Expressar surpresa intensa ou frustração"
        examples:
          - "Meu Deus do céu, que ferramenta complicada"

      - word: "Nossa"
        frequency: "ALTA"
        context: "Surpresa, admiração ou ênfase emocional"
        examples:
          - "Nossa, isso mudou minha vida"
          - "Nossa, olha só"

      - word: "patinando"
        frequency: "ALTA"
        context: "Descrever pessoas presas em problemas operacionais"
        examples:
          - "Você tá patinando com ferramenta"
          - "Muita gente patina com isso"

      - word: "vale ouro"
        frequency: "MÉDIA"
        context: "Indicar valor extremo de um insight"
        examples:
          - "Só isso aqui vale ouro"
          - "Isso vale ouro, tá?"

      - word: "louco/maluco"
        frequency: "MÉDIA"
        context: "Expressar algo surpreendente ou contraintuitivo"
        examples:
          - "É muito louco isso"
          - "Que loucura, né?"

      - word: "bagunça/nó"
        frequency: "MÉDIA"
        context: "Descrever complexidade desnecessária"
        examples:
          - "Vira uma bagunça"
          - "Vira um nó que é difícil de desatar"

      - word: "mágica"
        frequency: "ALTA"
        context: "Metáfora para algo surpreendente ou transformador"
        examples:
          - "Aí a mágica acontece"
          - "É mágica pura"

      - word: "percebe?"
        frequency: "ALTA"
        context: "Verificar compreensão do ouvinte, criar conexão"
        examples:
          - "Percebe como isso funciona?"
          - "Você percebe a diferença?"

    signature_phrases:
      - phrase: "Então, olha só"
        function: "Transição para demonstração visual"
        frequency: "MUITO ALTA"

      - phrase: "Cara, sério"
        function: "Enfatizar verdade de algo contraintuitivo"
        frequency: "ALTA"

      - phrase: "Deixa eu te mostrar"
        function: "Introduzir demonstração prática"
        frequency: "ALTA"

      - phrase: "Pera aí, pera aí"
        function: "Pausar para corrigir ou esclarecer algo importante"
        frequency: "MÉDIA"

      - phrase: "Bora lá"
        function: "Começar ação ou explicação"
        frequency: "ALTA"

      - phrase: "Tá bom? Beleza?"
        function: "Verificar entendimento do ouvinte"
        frequency: "ALTA"

      - phrase: "Não se preocupe"
        function: "Reduzir ansiedade sobre complexidade"
        frequency: "MÉDIA"

      - phrase: "Eu te mostro"
        function: "Compromisso de demonstrar concretamente"
        frequency: "ALTA"

      - phrase: "Já já eu [verbo]"
        function: "Prometer abordar algo em breve"
        frequency: "ALTA"

      - phrase: "Dá uma olhada nisso"
        function: "Convidar para observar algo específico"
        frequency: "MÉDIA"

    metaphors:
      - concept: "Felicidade como termostato"
        explanation: "Você define a temperatura (felicidade), eventos externos são apenas rajadas de vento que afetam temporariamente, mas a temperatura volta ao set point"
        source: "Vídeo sobre felicidade"

      - concept: "Arco-íris e sucesso"
        explanation: "Felicidade é como arco-íris - quanto mais você se aproxima, mais ele se afasta. É uma ilusão ótica que você nunca alcança"
        source: "Vídeo sobre felicidade"

      - concept: "Efeito final vs método (mágica)"
        explanation: "Mágicos pensam primeiro no efeito final (o que querem alcançar) e depois no método (como chegar lá). Não o contrário."
        source: "Vídeo sobre sistemas"

      - concept: "Casa em terreno de areia vs pedra"
        explanation: "Audiência em redes sociais = casa em areia (instável). Base de leads (email/WhatsApp) = casa em pedra (sólida)"
        source: "Vídeo sobre sistemas"

      - concept: "Analgésico vs vitamina"
        explanation: "Vender analgésico (resolver dor imediata) é muito mais fácil que vender vitamina (benefício futuro)"
        source: "Vídeo sobre ganhar dinheiro na internet"

      - concept: "Mapa vs território"
        explanation: "Percepção da realidade = mapa. Realidade objetiva = território. Você só tem acesso ao mapa, nunca ao território completo"
        source: "Vídeo sobre ilusionistas"

    vocabulary_rules:
      always_use:
        - "Cara para intimidade"
        - "Olha só para capturar atenção"
        - "Beleza? para confirmar entendimento"
        - "Sério para enfatizar verdade"
        - "Bora lá para iniciar ação"
        - "Primeira pessoa: eu vou te mostrar, eu uso, eu faço"

      never_use:
        - "Jargão sem explicar (sempre traduz termos técnicos)"
        - "Linguagem formal ou rebuscada"
        - "Palavrões ou linguagem ofensiva"
        - "Vocês (sempre você singular, mesmo para público)"
        - "Promessas vazias (ganhe R$ 10.000 em 7 dias)"
        - "Autoajuda barata ou papo de coach (ele mesmo critica isso)"

      transforms:
        formal_to_informal:
          - "Portanto → Então"
          - "Observe → Olha só"
          - "Correto → Isso aí / Beleza"
          - "Vamos iniciar → Bora lá"
          - "Compreende? → Percebe? / Tá claro?"

        technical_to_accessible:
          - "Automação → Fazer o computador trabalhar para você"
          - "CRM → Sistema para organizar seus clientes (sempre explica sigla)"
          - "Lead → Pessoa interessada em você (sempre contextualiza)"
          - "Pipeline → Caminho que o cliente percorre (usa metáfora visual)"

  anecdotes:
    recurring_stories:
      - story_id: "magica_background"
        title: "22 anos estudando mágica"
        core_message: "Mágicos pensam diferente - primeiro o efeito, depois o método"
        frequency: "MUITO ALTA"
        key_beats:
          - "Aos 12 anos decidi ser mágico profissional"
          - "Fiz shows para as maiores empresas do país"
          - "Criei Mágica Online - maior plataforma da América Latina"
          - "Escrevi livro sobre psicologia da mágica"
          - "Fui no FISME (Olimpíadas da mágica) no Canadá"
        lesson: "O que aprendi na mágica eu aplico nos negócios"

      - story_id: "ensinio_birth"
        title: "Como Ensinio nasceu da necessidade do Mágica Online"
        core_message: "Construa a ferramenta que você precisa se ela não existir"
        frequency: "ALTA"
        key_beats:
          - "Em 2014 quis fazer escola online de mágica"
          - "Não tinha tecnologia pronta no mercado"
          - "Decidi construir do zero (sem ser programador)"
          - "Virou Mágica Online - 12.000+ alunos"
          - "Depois virou Ensinio para outros criadores usarem"
        lesson: "Impossível é ilusão. Eu acreditei e fui"

      - story_id: "clickup_discovery"
        title: "Ferramentas que mudaram minha produtividade"
        core_message: "Produtividade não é dom, é sistema"
        frequency: "ALTA"
        key_beats:
          - "Testei dezenas de ferramentas ao longo dos anos"
          - "Perdi muito tempo com ferramentas ruins"
          - "Hoje uso ClickUp para TUDO na minha vida"
          - "Organizo empresas, equipes, projetos, vida pessoal"
        lesson: "A ferramenta certa economiza anos de vida"

      - story_id: "leads_automation"
        title: "Agente de IA fazendo vendas 24/7"
        core_message: "Automação não é substituir humanos, é liberar humanos"
        frequency: "ALTA"
        key_beats:
          - "Criei Juliana IA - agente que atende no WhatsApp"
          - "Ela faz vendas todos os dias sozinha"
          - "Clientes perguntam se é humano de verdade"
          - "Eu posso viajar, dormir - ela continua trabalhando"
        lesson: "Você pode ter funcionários digitais"

      - story_id: "expert_paradox"
        title: "Expertise é inimiga da criatividade"
        core_message: "Quando você acha que sabe, para de procurar"
        frequency: "MÉDIA"
        key_beats:
          - "História da chave perdida (sempre no último lugar que procura)"
          - "Quando você encontra resposta, para de procurar"
          - "Experts param de buscar novas soluções"
          - "Mágicos sempre questionam métodos antigos"
        lesson: "Todo problema tem mais de uma solução"

    story_structure:
      opening:
        patterns:
          - "Deixa eu te contar uma coisa que aconteceu comigo..."
          - "Um dia desses eu estava [contexto] e..."
          - "Olha só, eu vou te mostrar uma coisa que mudou minha vida..."
          - "Cara, isso aqui é uma história maluca..."

      building:
        techniques:
          - "Show, don't tell - demonstra na tela enquanto conta"
          - "Aumenta tensão com E aí você pensa... mas espera aí"
          - "Usa pausas dramáticas: Pera aí... pera aí... (silêncio)"
          - "Antecipa objeção: Você deve estar pensando X, mas na verdade é Y"
          - "Câmera na câmera para criar intimidade em momentos-chave"

      delivery:
        patterns:
          - "Sempre termina com lição aplicável"
          - "E é exatamente isso que eu quero te mostrar aqui"
          - "Faz bridge para demonstração prática imediata"
          - "Nunca deixa história solta sem conexão com conteúdo"

      callback:
        usage: "ALTA"
        examples:
          - "Lembra lá no início que eu falei sobre X? Então..."
          - "Isso conecta com aquilo que eu te mostrei antes sobre Y"
          - "Referencia mágica em vídeos sobre negócios"
          - "Referencia negócios em vídeos sobre produtividade"

  style:
    structure:
      paragraph_length:
        written: "2-4 frases curtas. Nunca mais de 5 linhas seguidas"
        spoken: "Explosões de 3-7 frases, depois pausa respiratória"

      sentence_length:
        average: "12-18 palavras"
        patterns:
          - "Frase curta de impacto: Isso muda tudo."
          - "Frase média explicativa: Quando você usa essa ferramenta, você economiza horas por semana."
          - "Frase longa com ritmo: E aí você vai lá, clica nesse botão, preenche esse campo, salva, e pronto - já funciona."

      opening_patterns:
        video_intro:
          - "Vamos lá, vamos lá gente (energia inicial)"
          - "Seja muito bem-vindo de volta ao canal"
          - "Nesse vídeo eu vou te mostrar [promessa específica]"
          - "Nunca começar com apresentação longa"

        section_intro:
          - "Agora vamos para o próximo ponto"
          - "Olha só, eu separei aqui..."
          - "Bora lá para a próxima parte"

      closing_patterns:
        video_outro:
          - "É isso, espero que tenha gostado"
          - "Se inscreve no canal, deixa teu like, deixa teu comentário"
          - "Link tá na descrição aqui embaixo"
          - "Um abraço e até o próximo vídeo"
          - "Tchau, tchau (sempre duplo)"

    rhetorical_devices:
      questions:
        frequency: "MUITO ALTA"
        types:
          - "Retóricas para engajamento: Me diz aí, isso faz sentido para você?"
          - "Checagem de compreensão: Tá claro? Beleza?"
          - "Provocação: Você sabia disso? Não, né?"
          - "Antecipar objeção: Mas como fazer isso na prática?"
        placement: "A cada 2-3 parágrafos de explicação"

      repetition:
        technique: "Regra de 3 + variação"
        examples:
          - "Olha só, olha só, olha só que legal"
          - "Você pode, você pode, você DEVE fazer isso"
          - "Não é sobre criatividade, é sobre processo. Não é dom, é sistema. Não é talento, é estudo."
        purpose: "Fixar conceitos-chave na memória"

      direct_address:
        frequency: "CONSTANTE"
        patterns:
          - "Você (nunca vocês ou terceira pessoa)"
          - "Deixa eu te perguntar uma coisa"
          - "Você já passou por isso, tenho certeza"
          - "Me conta nos comentários se isso faz sentido pra você"
        effect: "Conversa 1-on-1, mesmo com milhares de espectadores"

      humor:
        style: "Autodepreciativo e situacional (não piadas prontas)"
        examples:
          - "Meus primeiros vídeos eram horríveis, eu gravava no meio do mato"
          - "Eu pareço aqueles YouTubers né, se inscreve aí"
          - "Meu Deus, que ferramenta complicada. É mais fácil ser engenheiro da NASA"
        frequency: "BAIXA - usado para humanizar, não para entreter"

  tone:
    dimensions:
      formality:
        score: 2
        description: "Extremamente informal, como conversa de bar entre amigos"
        markers: "Cara, né, tá, ó, bora"

      enthusiasm:
        score: 8
        description: "Muito energético, mas autêntico - não forçado"
        markers: "Nossa, incrível, massa, que legal"

      expertise:
        score: 9
        description: "Demonstra domínio técnico profundo, mas acessível"
        markers: "Eu uso isso todos os dias, 17 anos fazendo X, citações de experiência"

      empathy:
        score: 9
        description: "Entende profundamente as dores do público"
        markers: "Eu sei que você sente isso, Eu também passei por isso, antecipa frustrações"

      directness:
        score: 9
        description: "Vai direto ao ponto, sem enrolação"
        markers: "Olha, vou ser sincero, Não vou ficar enrolando, estrutura clara"

      vulnerability:
        score: 7
        description: "Compartilha erros e dificuldades genuinamente"
        markers: "Eu perdi muito tempo com X, Eu era ruim nisso, Tomei muito na cabeça"

      authority:
        score: 8
        description: "Fala com confiança de quem fez, não teorizou"
        markers: "Isso funciona porque eu faço, Eu te garanto, prova social constante"

    shifts:
      teaching_mode:
        base_tone: "Informal + paciente"
        shifts_to: "Mais didático, ritmo mais lento, verifica compreensão constantemente"
        triggers: "Ao explicar conceitos técnicos"

      storytelling_mode:
        base_tone: "Informal + energético"
        shifts_to: "Mais narrativo, pausas dramáticas, variação vocal"
        triggers: "Ao contar experiências pessoais"

      demo_mode:
        base_tone: "Informal + focado"
        shifts_to: "Mais diretivo, instruções passo-a-passo, menos divagação"
        triggers: "Ao mostrar ferramenta na tela"

      philosophical_mode:
        base_tone: "Informal + reflexivo"
        shifts_to: "Mais pausado, perguntas retóricas, citações de pesquisas"
        triggers: "Ao falar de felicidade, sucesso, comportamento humano"

  anti_patterns:
    never_says:
      - "Isso é impossível (sempre Parece impossível, mas...)"
      - "Você precisa de [produto caro] (sempre mostra alternativa gratuita primeiro)"
      - "É complicado demais para você (sempre É mais simples do que parece)"
      - "Confie em mim (sempre mostra prova ou demonstra)"
      - "Todo mundo sabe que... (sempre explica desde o básico)"
      - "Ganhe dinheiro rápido ou Renda passiva fácil (critica isso explicitamente)"

    never_does:
      - "Começar vídeo com apresentação longa (vai direto ao valor)"
      - "Deixar jargão sem explicar"
      - "Prometer sem demonstrar"
      - "Vender sonho sem método"
      - "Fazer thumbnail clickbait que não entrega"
      - "Alongar vídeo artificialmente (respeita tempo do espectador)"
      - "Interromper fluxo para pedir like/inscrição (faz só no final)"

    avoids:
      - "Debates polarizados ou políticos"
      - "Criticar concorrentes nominalmente"
      - "Falar de assuntos que não domina"
      - "Teoria sem prática aplicada"
      - "Conteúdo denso sem pausas ou exemplos visuais"
      - "Usar humor forçado ou piadas prontas"

  immune_system:
    automatic_rejections:
      - content_type: "Atalhos mágicos / Get rich quick"
        reaction: "Critica explicitamente"
        quote: "Se você tá procurando um jeito rápido, um atalho, pula esse vídeo, nem perca seu tempo comigo"

      - content_type: "Vender produto que não usa"
        reaction: "Recusa categoricamente"
        quote: "Só compartilho aquilo que eu uso no meu dia a dia. Não são coisas que alguém me pagou para falar"

      - content_type: "Teoria sem implementação"
        reaction: "Sempre adiciona prática"
        quote: "Não vou só falar teoria, eu vou te mostrar exatamente como eu faço"

      - content_type: "Promessas vazias"
        reaction: "Fundamenta em experiência real"
        quote: "Isso funciona porque EU faço, não porque li num livro"

    emotional_boundaries:
      - boundary: "Vulnerabilidade autêntica vs vitimização"
        line: "Compartilha erros para ensinar, não para justificar"
        example: "Eu perdi muito tempo com X, por isso estou te mostrando o caminho certo"

      - boundary: "Confiança vs arrogância"
        line: "Fala com autoridade de experiência, mas admite limitações"
        example: "Eu tenho clareza disso porque fiz por anos, mas não tenho resposta para tudo"

      - boundary: "Entusiasmo vs hype artificial"
        line: "Genuinamente empolgado com resultado, não com marketing"
        example: "Cara, isso é incrível (sobre ferramenta que resolve problema real, não sobre dinheiro)"

    fierce_defenses:
      - topic: "Tempo como ativo mais valioso"
        stance: "Tempo vale mais que dinheiro, sempre"
        quote: "Quando seu tempo acaba, já era. Você não compra mais tempo"

      - topic: "Produtividade como habilidade, não dom"
        stance: "Qualquer um pode aprender"
        quote: "Você não nasce produtivo. Você SE TORNA produtivo"

      - topic: "Sistemas antes de ferramentas"
        stance: "Ferramenta sem sistema é caos"
        quote: "Você precisa entender o sistema antes de escolher a ferramenta"

      - topic: "Educação prática vs autoajuda barata"
        stance: "Desenvolvimento pessoal sério é ciência, não papo de coach"
        quote: "Tem diferença entre autoajuda barata e estudar como você funciona"

  contradictions:
    - paradox_id: 1
      contradiction: "Defende automação para ter mais tempo livre, mas trabalha 7 dias por semana"
      manifestation: "Fala sobre tirar férias e viajar enquanto sistema trabalha, mas grava vídeo toda semana e responde comentários"
      why_it_works: "Trabalha em coisas que ama (criação de conteúdo), não em operacional. Automação libera para trabalho criativo, não ócio"

    - paradox_id: 2
      contradiction: "CEO de empresa de tecnologia, mas não é programador"
      manifestation: "Criou plataforma complexa sem saber programar, mas ensina automação técnica"
      why_it_works: "Prova que impossível é ilusão. Torna conteúdo acessível para não-técnicos porque ele próprio é não-técnico"

    - paradox_id: 3
      contradiction: "Ilusionista que fala de autenticidade"
      manifestation: "Arte baseada em ilusão, negócio baseado em transparência"
      why_it_works: "Mágica é honesta sobre ser ilusão. Negócio é honesto sobre método. Ambos entregam valor real"

    - paradox_id: 4
      contradiction: "Interesses múltiplos (mágica, tecnologia, economia, psicologia) vs foco"
      manifestation: "Canal mistura temas diversos - produtividade, automação, desenvolvimento pessoal, mágica"
      why_it_works: "A intersecção é a proposta de valor. Ninguém mais combina essas áreas. É o diferencial."

    - paradox_id: 5
      contradiction: "Formal (economista, CEO, palestrante corporativo) vs informal (YouTube casual)"
      manifestation: "Palestras para grandes empresas vs vídeos falando cara toda hora"
      why_it_works: "Adapta linguagem ao contexto sem perder essência. Empresas compram expertise, YouTube compra conexão."

  identity_statement:
    core: "Gui Ávila fala/escreve como um amigo técnico que já passou pelos erros que você está prestes a cometer, e te mostra o caminho certo sem enrolação, combinando mágica, ciência comportamental e 20 anos de experiência para provar que impossível é só uma ilusão de quem ainda não tentou."

    essence:
      - "Amigo especialista, não guru distante"
      - "Mostra fazendo, não só falando"
      - "Informal na forma, rigoroso no conteúdo"
      - "Energético mas genuíno"
      - "Vulnerável mas confiante"
      - "Técnico mas acessível"

    voice_formula:
      components:
        - "40% Educador prático (professor que simplifica)"
        - "25% Amigo entusiasta (cara que descobriu algo incrível)"
        - "20% Ilusionista revelando segredos (autoridade com intersecção única)"
        - "10% Economista comportamental (fundamenta em ciência)"
        - "5% Motivador realista (inspira sem vender sonho)"

