pack:
  name: advisor-board
  version: 1.0.0
  short-title: Advisory Board
  description: >-
    Personal advisory board of 13 elite minds spanning strategy, execution,
    thinking, and vision. Each advisor is cloned from documented frameworks
    with high-fidelity DNA. The board-chief orchestrates sessions by routing
    questions to the right advisors based on the user's ENTP cognitive profile.
  author: Luiz Fosc
  icon: "🏛️"
  slashPrefix: advisorBoard

pattern_library:
  prefix: AB
  naming_convention:
    format: "{PREFIX}-{CATEGORY}-{NUMBER}"
    example: "AB-TP-001"
  categories:
    - id: TP
      name: "Task Patterns"
      description: "Patterns for advisory task structure"
    - id: EP
      name: "Executor Patterns"
      description: "Patterns for executor selection"
    - id: PP
      name: "Process Patterns"
      description: "Patterns for advisory workflows"
  patterns: []

tier_structure:
  orchestrator: board-chief
  tier_0:
    name: "Diagnostico"
    agents: [board-chief]
    purpose: "Analisa pergunta, consulta perfil ENTP, roteia para advisors"
  tier_1_strategy:
    name: "Strategy"
    agents: [hamilton-helmer, verne-harnish, clayton-christensen, elon-musk]
    purpose: "Estrategia competitiva, scaling, inovacao disruptiva, first principles"
  tier_1_execution:
    name: "Execution"
    agents: [alex-hormozi, keith-cunningham, chris-voss]
    purpose: "Growth, capital allocation, negociacao"
  tier_1_thinking:
    name: "Thinking"
    agents: [annie-duke, nassim-taleb, shane-parrish, naval-ravikant]
    purpose: "Decision making, antifragilidade, modelos mentais, filosofia"
  tier_1_vision:
    name: "Vision"
    agents: [steve-jobs, walt-disney]
    purpose: "Product vision, criatividade, brand"

