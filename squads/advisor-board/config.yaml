user_profile:
  dna_path: "squads/luiz-fosc/data/dna/"
  mbti: "ENTP"
  cognitive_style: "Ne-Ti dominant, convergent thinker under pressure"

task_standards:
  enforce_anatomy: true
  validator: "AB-TP-001"
  required_fields:
    - task_name
    - status
    - responsible_executor
    - execution_type
    - input
    - output
    - action_items
    - acceptance_criteria

workflow_config:
  checkpoint_policy: advisory
  fail_fast: false
  allow_manual_override: true
