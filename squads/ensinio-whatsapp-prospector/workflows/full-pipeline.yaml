# Full Pipeline Workflow
# Parse WhatsApp export -> Validate -> Analyze -> Write -> Validate -> GHL Sync -> Populate Sheets
name: full-pipeline
version: "3.0.0"
description: "Pipeline completo de prospeccao: ZIP WhatsApp -> GHL (Contact + Deal + Message) -> Google Sheets"

trigger:
  command: "*full-pipeline {zip_path} {group_name}"
  inputs:
    - name: zip_path
      type: string
      required: true
      description: "Path to WhatsApp ZIP export file"
    - name: group_name
      type: string
      required: true
      description: "Name of the WhatsApp group"

# Global pipeline configuration
pipeline_config:
  max_contacts: 500
  min_score_threshold: 3
  max_rework_iterations: 2
  progress_reporting: true
  progress_interval: "10%"

# Retry policy for transient failures
retry_policy:
  max_retries: 2
  backoff: exponential
  initial_delay_seconds: 5
  retryable_errors:
    - "timeout"
    - "rate_limit"
    - "temporary_unavailable"

phases:
  - id: phase-1-parse
    name: "Parse WhatsApp Export"
    agent: chat-parser
    model: haiku
    task: tasks/parse-chat-export.md
    timeout_minutes: 10
    inputs:
      - zip_path
      - group_name
    outputs:
      - parsed_contacts
      - group_metadata
    veto_conditions:
      - condition: "ZIP file does not exist"
        severity: BLOCKING
        action: HALT
      - condition: "ZIP file is corrupted"
        severity: BLOCKING
        action: HALT
    description: |
      Extrair do ZIP todos os contatos e mensagens.
      Agrupar por remetente, extrair telefones, filtrar sistema.
    on_failure:
      task: tasks/handle-parse-errors.md
      agent: chat-parser
      model: haiku
    rollback: "No rollback needed - read-only operation"

  - id: phase-1b-validate-parse
    name: "Validate Parsed Data"
    agent: chat-parser
    model: haiku
    task: tasks/validate-parsed-data.md
    timeout_minutes: 5
    depends_on:
      - phase-1-parse
    inputs:
      - parsed_contacts
      - group_metadata
    outputs:
      - validation_report
      - quality_metrics
    quality_gate: QG-001
    veto_conditions:
      - condition: "0 contacts extracted"
        severity: BLOCKING
        action: HALT
      - condition: "< 10 non-system messages"
        severity: BLOCKING
        action: HALT
      - condition: "Phone coverage < 50%"
        severity: WARNING
        action: LOG_AND_CONTINUE
    description: |
      Validar integridade dos dados parseados.
      Checklist de qualidade pos-extracao.
      Se FAIL, acionar handle-parse-errors.
    on_failure:
      task: tasks/handle-parse-errors.md
      agent: chat-parser
      model: haiku
    rollback: "Re-parse with different encoding if format issue"

  - id: phase-2-load-kb
    name: "Load Ensinio Knowledge Base"
    agent: prospector-chief
    model: sonnet
    task: tasks/load-ensinio-kb.md
    timeout_minutes: 5
    parallel_with: phase-1-parse
    outputs:
      - ensinio_kb
    veto_conditions:
      - condition: "KB source file not found"
        severity: BLOCKING
        action: HALT
      - condition: "KB file is empty"
        severity: BLOCKING
        action: HALT
      - condition: "Not all 5 pillars detected"
        severity: WARNING
        action: LOG_AND_CONTINUE
    description: |
      Carregar e estruturar os 5 pilares de solucao Ensinio (67 features).
      Source: data/ensinio-solutions-kb.md
      Pode rodar em paralelo com o parsing.
    rollback: "No rollback needed - read-only operation"

  - id: phase-2b-resolve-phones
    name: "Resolve Phone Numbers (Interactive)"
    agent: prospector-chief
    model: sonnet
    task: tasks/resolve-phone-numbers.md
    timeout_minutes: 60
    depends_on:
      - phase-1b-validate-parse
    inputs:
      - parsed_contacts
      - group_name
    outputs:
      - contacts_with_phones
      - phone_book_path
      - phone_resolution_summary
    veto_conditions:
      - condition: "validate-parsed-data not completed"
        severity: BLOCKING
        action: HALT
      - condition: "All contacts already have phones"
        severity: INFO
        action: SKIP_PHASE
      - condition: "All contacts skipped by user"
        severity: WARNING
        action: "LOG_AND_CONTINUE (pipeline produces empty results)"
    description: |
      Fase interativa: apresentar contatos sem telefone ao usuario.
      Resolver numeros no formato E.164 (+55XXXXXXXXXXX).
      Salvar phone-book per group em data/phone-books/{group-slug}.json.
      Reutilizar phone-book se grupo ja foi processado antes.
    rollback: "No rollback needed - phone-book is additive"

  - id: phase-3-analyze
    name: "Analyze & Score Prospects"
    agent: prospect-analyst
    model: sonnet
    task: tasks/analyze-prospects.md
    timeout_minutes: 30
    depends_on:
      - phase-2b-resolve-phones
      - phase-2-load-kb
    inputs:
      - contacts_with_phones
      - ensinio_kb
    outputs:
      - scored_prospects
      - disqualified_prospects
    quality_gate: QG-002
    veto_conditions:
      - condition: "Contacts with phones not available"
        severity: BLOCKING
        action: HALT
      - condition: "KB not loaded"
        severity: BLOCKING
        action: HALT
    description: |
      Red flag pre-screen (BLOQUEADOR = score 0, excluir).
      ICP match assessment (bonus scoring).
      Cruzar cada contato com solucoes Ensinio.
      Scoring de temperatura (1-10) com v2.1 criteria.
      Classificar: cliente potencial vs parceiro.
      Filtrar score >= 3.
      Selecionar argumento recomendado por score range.
    rollback: "Re-analyze with adjusted scoring criteria"

  - id: phase-3b-validate-scoring
    name: "Validate Scoring Quality"
    agent: prospector-chief
    model: sonnet
    task: checklists/scoring-validation-checklist.md
    timeout_minutes: 5
    depends_on:
      - phase-3-analyze
    inputs:
      - scored_prospects
    outputs:
      - scoring_validation_report
    quality_gate: QG-002.5
    veto_conditions:
      - condition: "Score distribution is uniform (all same score)"
        severity: WARNING
        action: LOG_AND_CONTINUE
      - condition: "No prospects with score >= 3"
        severity: BLOCKING
        action: HALT
    description: |
      Validar qualidade do scoring.
      Verificar distribuicao de scores.
      Sanity check de classificacao.

  - id: phase-4-write
    name: "Write Personalized Messages"
    agent: outreach-writer
    model: opus
    task: tasks/write-outreach.md
    timeout_minutes: 45
    depends_on:
      - phase-3b-validate-scoring
    inputs:
      - scored_prospects
    outputs:
      - messages_with_links
    veto_conditions:
      - condition: "Prospect analysis not available"
        severity: BLOCKING
        action: HALT
      - condition: "Message rules not loaded"
        severity: BLOCKING
        action: HALT
    description: |
      Escrever mensagem personalizada por prospect.
      Gerar links diretos de WhatsApp com URL encoding.
    rollback: "Rewrite specific messages that failed validation"

  - id: phase-4b-validate-outreach
    name: "Validate Outreach Batch"
    agent: prospector-chief
    model: sonnet
    task: tasks/validate-outreach-batch.md
    timeout_minutes: 15
    depends_on:
      - phase-4-write
    inputs:
      - messages_with_links
    outputs:
      - approved_messages
      - rejected_messages
    quality_gate: QG-003
    veto_conditions:
      - condition: "No messages in batch"
        severity: BLOCKING
        action: HALT
      - condition: "Quality checklist not loaded"
        severity: BLOCKING
        action: HALT
      - condition: "> 30% messages rejected"
        severity: WARNING
        action: REWORK
    description: |
      Validar humanizacao e qualidade de cada mensagem.
      Validar links WhatsApp.
      Reenviar rejeitadas para rewrite se necessario.
    on_failure:
      rework:
        task: tasks/write-outreach.md
        agent: outreach-writer
        max_iterations: 2
        input: rejected_messages
    rollback: "Return to phase-4-write with rejection feedback"

  - id: phase-5-ghl-sync
    name: "Sync to GoHighLevel (Contact + Deal + Message)"
    agent: prospector-chief
    model: sonnet
    task: tasks/sync-to-ghl.md
    timeout_minutes: 30
    depends_on:
      - phase-4b-validate-outreach
    inputs:
      - approved_messages
    outputs:
      - ghl_contacts_created
      - ghl_deals_created
      - ghl_messages_sent
      - ghl_sync_report
    quality_gate: QG-005
    veto_conditions:
      - condition: "GHL API token not configured"
        severity: BLOCKING
        action: HALT
      - condition: "GHL pipeline not found"
        severity: BLOCKING
        action: HALT
      - condition: "Rate limit exceeded"
        severity: WARNING
        action: "WAIT_AND_RETRY"
    description: |
      Para cada prospect aprovado:
      1. Perguntar tags ao usuario (default: "Leads Fosc")
      2. POST /contacts/ → criar/buscar contato no GHL (com tags)
      3. POST /opportunities/ → criar deal no pipeline Qualificacao
      4. POST /conversations/messages → enviar mensagem de outreach
      Batch com delay de 600ms entre requests (rate limit ~100/min).
      Idempotency keys para evitar duplicatas.
    rollback: "Deals can be manually deleted in GHL if needed"

  - id: phase-6-sheet
    name: "Populate Google Sheets"
    agent: prospector-chief
    model: sonnet
    task: tasks/populate-sheet.md
    timeout_minutes: 10
    depends_on:
      - phase-5-ghl-sync
    inputs:
      - approved_messages
    outputs:
      - sheet_url
      - summary_stats
    quality_gate: QG-004
    veto_conditions:
      - condition: "No approved messages to populate"
        severity: BLOCKING
        action: HALT
      - condition: "Google Sheets access not available"
        severity: BLOCKING
        action: HALT
      - condition: "Sheet already has data"
        severity: WARNING
        action: ASK_USER
    description: |
      Popular a planilha Google Sheets com todos os dados.
      Ordenar por temperatura.
      Validar links.
    rollback: "Clear sheet rows and re-populate"

completion:
  summary: |
    Pipeline completo! Resultados:
    - GHL: Contatos, deals e mensagens sincronizados
    - Planilha: https://docs.google.com/spreadsheets/d/124EQQAkmt9D7-49LbR-Jx64DhxdtCwceUQgqolk5ZFI
  report:
    - total_contacts_parsed
    - total_qualified_prospects
    - prospects_by_type
    - prospects_by_pillar
    - temperature_distribution
    - messages_approved_vs_rejected
    - batch_quality_score
    - quality_gates_summary
    - ghl_contacts_created
    - ghl_deals_created
    - ghl_messages_sent
    - ghl_tags_applied
