    note: "Versão SUPERIOR à Roda 6 áreas (F16). Usar como padrão."
    source: "mc-roda-do-palestrante-notavel.md"

  - id: F18
    name: "4 Técnicas de Abertura"
    type: "PROPRIETÁRIO"
    version: "v2"
    domain: "keynote-design"
    techniques: 4
    rule: "4 formas de abrir palestra para capturar atenção imediata"
    source: "bonus-ferramenta-aula1-do-zero-ao-palestrante.md"

  - id: F19
    name: "Agency Prospecting Funnel"
    type: "PROPRIETÁRIO"
    version: "v2"
    domain: "business-development"
    phases: 3
    rule: "Base → Expansão → Consolidação"
    caveat: "Dados de 2018 — validar antes de usar"
    source: "mc-agencia-de-palestrantes.md"

  - id: F20
    name: "International Event Replication Model"
    type: "PROPRIETÁRIO"
    version: "v2"
    domain: "events"
    rule: "100 pessoas + 3-4 speakers + sponsor tiers"
    source: "mc-evento-empreendedorismo-florida/londres.md"

# Ecosystem Map
ecosystem:
  description: "3 frameworks proprietários formam um ecossistema integrado"
  flow: "F17 (Diagnóstico) → F7 (Gestão) → F15 (Planejamento)"
  detail:
    - step: 1
      framework: F17
      role: "Diagnostica onde você está (10 áreas, 0-10)"
    - step: 2
      framework: F7
      role: "Organiza tempo e prioridades (12 blocos)"
    - step: 3
      framework: F15
      role: "Arquiteta cada palestra individual (11 blocos)"
