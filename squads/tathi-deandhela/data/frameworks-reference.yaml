# Frameworks Reference — Tathi Deandhela Squad v2
# Total: 20 frameworks (6 v1 + 14 v2 delta)

frameworks:
  # === v1: Extraídos de transcrições ===

  - id: F1
    name: "Focused Positioning Loop"
    type: "PRINCIPLES"
    version: "v1"
    domain: "positioning"
    rule: "Escolher 1 tema principal por ciclo de crescimento"

  - id: F2
    name: "Roteiro de Palestra Memorável"
    type: "METHODOLOGY"
    version: "v1"
    domain: "keynote-design"
    rule: "Toda palestra precisa de início, meio e fim com linha de raciocínio"

  - id: F3
    name: "Design Sensorial de Ambiente"
    type: "METHODOLOGY"
    version: "v1"
    domain: "stage-design"
    rule: "Preparação emocional do ambiente começa antes da fala"

  - id: F4
    name: "Sales as Process (Not Event)"
    type: "METHODOLOGY"
    version: "v1"
    domain: "sales"
    rule: "Venda é sequência de etapas; pular etapa derruba eficácia"

  - id: F5
    name: "Persuasion Ethics Filter"
    type: "FILTER"
    version: "v1"
    domain: "persuasion"
    rule: "Toda influência deve manter benefício mútuo e horizonte longo"

  - id: F6
    name: "Authority Construction Model"
    type: "MODEL"
    version: "v1"
    domain: "authority"
    rule: "Autoridade sustentável = caráter + competência"

  # === v2 Delta: Extraídos de 21 MDs complementares ===

  - id: F7
    name: "Time Model Canvas"
    type: "PROPRIETÁRIO"
    version: "v2"
    domain: "time-management"
    blocks: 12
    rule: "Framework visual de gestão de tempo com post-its"
    ecosystem_role: "Gestão (meio do ecossistema)"
    source: "bonus-ebook-time-model-canvas.md"

  - id: F8
    name: "Progressive Regressive Visualization"
    type: "PROPRIETÁRIO"
    version: "v2"
    domain: "planning"
    steps: 10
    rule: "Brainstorm → Meditação → 10a→5a→1a→6m→3m→1m→15d→1sem"
    source: "bonus-ebook-time-model-canvas.md"

  - id: F9
    name: "Pedras Grandes Prioritization"
    type: "ADAPTED"
    version: "v2"
    domain: "prioritization"
    origin: "Stephen Covey"
    rule: "Pedras grandes → Cascalho → Areia → Água. Pareto: 80% = 20%"
    source: "bonus-ebook-time-model-canvas.md"

  - id: F10
    name: "Delegation Protocol (WHY + HOW)"
    type: "PROPRIETÁRIO"
    version: "v2"
    domain: "delegation"
    rule: "Explicar POR QUE + COMO, não apenas O QUE"
    source: "bonus-ebook-time-model-canvas.md"

  - id: F11
    name: "Elimination Test"
    type: "PROPRIETÁRIO"
    version: "v2"
    domain: "prioritization"
    rule: "Deixar de fazer vai atrapalhar? SE não → eliminar"
    source: "bonus-ebook-time-model-canvas.md"

  - id: F12
    name: "Guardian Accountability System"
    type: "PROPRIETÁRIO"
    version: "v2"
    domain: "accountability"
    rule: "2-3 guardians + rewards + penalties para cada meta SMART"
    source: "bonus-ebook-time-model-canvas.md"

  - id: F13
    name: "5% Behavior Change Rule"
    type: "PROPRIETÁRIO"
    version: "v2"
    domain: "behavior-change"
    rule: "5% dos comportamentos = transformação extraordinária"
    source: "bonus-ebook-time-model-canvas.md"

  - id: F14
    name: "Contingency Planning (Goal-Preserving)"
    type: "PROPRIETÁRIO"
    version: "v2"
    domain: "planning"
    rule: "Plano B não é mudar a meta"
