  - id: F15
    name: "Speaker Canvas"
    type: "PROPRIETÁRIO"
    version: "v2"
    domain: "keynote-design"
    blocks: 11
    rule: "Transforma improviso em arquitetura de palestra"
    ecosystem_role: "Planejamento (fim do ecossistema)"
    source: "bonus-speaker-canvas.md"

  - id: F16
    name: "Ciclo de Ouro do Palestrante"
    type: "PROPRIETÁRIO"
    version: "v2"
