# Autoral / internal reference (LuizFosc original material):
autoral:
  - file: "Conferência Mágica e Cinema - LuizFosc v2.0.md"
    tier: "B"
    type: "nota-de-conferencia"
    author: "LuizFosc"
    word_count: 31036
    topics:
      - storytelling cinematográfico aplicado a performance
      - psicologia da emoção e suspense vs surpresa (Hitchcock)
      - ferramentas de roteiro (verossimilhança, subtexto, MacGuffin, Deus ex-machina, pista/recompensa)
      - estrutura narrativa 3 atos (Syd Field) e Método 4x4 (Joni Galvão)
      - conflito mágico (Pepe Carrol), dual reality (Kenton Knepper), pistas falsas (Tamariz)
      - montagem, edição, efeito Kuleshov, raccord
    mapped_to_agents:
      - robert-mckee  # premissa, conflitos, incidente incitante, viradas de valor
      - blake-snyder  # estrutura 3 atos, roteiro, ferramentas de roteiro
    note: "Material autoral do dono do squad — ponte única entre cinema, mágica e storytelling para palestras"

