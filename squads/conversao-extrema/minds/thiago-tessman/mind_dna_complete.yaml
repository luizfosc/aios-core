        - "Pixel Meta + Google Tag Manager instalados"
        - "Evento de conversao configurado"
        - "Primeira campanha ao ar"
        - "Analise de funil + otimizacao continua"
      rule: "Sequencia importa — nao pule etapas"
      source: "[SOURCE: gCQTU_U2iJM]"
    - name: "Creative Traffic Strategist (Novo Perfil Profissional)"
      areas: ["Copy (textos que convertem)", "Estrategia (campanhas que escalam)", "Criacao (criativos que performam)"]
      rationale: "Meta divulgou que 50% do resultado vem do criativo. Gestor tradicional (so configuracao) esta obsoleto."
      source: "[SOURCE: Live #172]"

  decision_heuristics:
    # --- EXISTING (H01-H15 from course) ---
    - id: "TT-H01"
      name: "Conexao como Prioridade"
      rule: "IF visitante nao compra THEN MUST capturar pelo menos Nivel C (remarketing tag)"
      source: "[SOURCE: 2V Conectar]"
    - id: "TT-H02"
      name: "Base Antes de Trafego"
      rule: "IF base (site, comunicacao, oferta) esta ruim THEN gastar em trafego = desperdicio"
      source: "[SOURCE: Plano de Crescimento]"
    - id: "TT-H03"
      name: "ROI P1 vs P2"
      rule: "IF budget limitado THEN priorizar P1 (remarketing) sobre P2 (prospeccao fria)"
      source: "[SOURCE: 2V Conectar]"
    - id: "TT-H04"
      name: "Menos Opcoes = Mais Vendas"
      rule: "IF muitas opcoes/pacotes THEN cliente fica em duvida -> nao compra"
      source: "[SOURCE: 4V Vender]"
    - id: "TT-H05"
      name: "Testemunho > Autopromocao"
      rule: "IF precisa criar anuncio THEN priorizar depoimento de cliente > voce falando"
      source: "[SOURCE: 6V Testemunhar]"
    - id: "TT-H06"
      name: "Basico Bem Feito"
      rule: "IF comecando THEN foco no basico com excelencia, nao invente moda"
      source: "[SOURCE: Plano de Crescimento]"
    - id: "TT-H07"
      name: "Especifico > Amplo"
      rule: "IF criando campanha THEN comece ultra-focado, amplie gradualmente conforme resultado"
      source: "[SOURCE: Rede de Pesquisa]"
    - id: "TT-H08"
      name: "CPA Desejado com Dados"
      rule: "IF 0 conversoes historicas THEN use Maximizar Conversoes SEM limite; AFTER 15-30 conversoes THEN mude para CPA Desejado +20%"
      source: "[SOURCE: Tipos de Lance, Estrategia de Lances]"
    - id: "TT-H09"
      name: "Pesquisa > Remarketing > Display"
      rule: "IF sem resultado em Pesquisa/Remarketing THEN nao va para Display"
      source: "[SOURCE: Rede de Display]"
    - id: "TT-H10"
      name: "Teste Um Por Vez"
      rule: "IF testando publicos no Facebook THEN 1 interesse por conjunto, mesmos 3 anuncios"
      source: "[SOURCE: Tipos de Publicos]"
    - id: "TT-H11"
      name: "Palavras Negativas Diarias"
      rule: "IF primeiras 2 semanas THEN verificar termos de pesquisa TODO DIA"
      source: "[SOURCE: Otimizacao de Palavras-chave]"
    - id: "TT-H12"
      name: "Frequencia por Temperatura"
      rule: "IF publico quente (2 dias) THEN frequencia alta; IF publico frio (30+ dias) THEN frequencia baixa"
      source: "[SOURCE: Otimizacao de Remarketing]"
    - id: "TT-H13"
      name: "Video Amador > Profissional (depoimentos)"
      rule: "IF coletando depoimento THEN celular do cliente > cameraman profissional"
      source: "[SOURCE: 6V Testemunhar]"
    - id: "TT-H14"
      name: "Produto de Necessidade vs Desejo"
      rule: "IF produto de necessidade THEN Google Pesquisa primeiro; IF produto de desejo THEN Facebook/Instagram primeiro"
      source: "[SOURCE: Facebook Ads]"
    - id: "TT-H15"
      name: "Escala Segura"
      rule: "IF escalando orcamento THEN maximo +20% por vez, esperar 3-5 dias entre aumentos"
      source: "[SOURCE: Estrategias Google Ads]"

    # --- NEW from YouTube (H16-H30, deduplicated & unified numbering) ---
    - id: "TT-H16"
      name: "Regra 95/5 — Dinheiro no Topo do Funil"
      rule: "IF foca so no fundo do funil (Google Pesquisa) THEN perde 95% das oportunidades. Invista em Meta Ads (criacao de demanda) E Google Ads (captura de demanda)"
      source: "[SOURCE: 5x69JFy3rAU]"
    - id: "TT-H17"
      name: "Uma Pagina, Um Objetivo"
      rule: "IF landing page tem DOIS CTAs principais THEN taxa de conversao cai 40-60%. Uma pagina = um objetivo. Crie paginas separadas."
      source: "[SOURCE: mLZj_mFy_iQ]"
    - id: "TT-H18"
      name: "Regra dos 5 Segundos Criticos"
      rule: "IF headline nao fisga nos primeiros 5 segundos THEN visitante sai. Cabeca da pagina = 80% do resultado."
      source: "[SOURCE: mLZj_mFy_iQ]"
    - id: "TT-H19"
      name: "Funil de Metricas — Otimize Etapa por Etapa"
      rule: "IF impressao sem clique THEN criativo ruim; IF clique sem lead THEN LP ruim; IF lead sem venda THEN follow-up/oferta ruim. Diagnostique ONDE antes de otimizar."
      source: "[SOURCE: gCQTU_U2iJM]"
    - id: "TT-H20"
      name: "ROI Zero = Vitoria (no inicio)"
      rule: "IF investir R$80 e lucrar R$80 THEN ja ganhou. Empate = construcao de base para remarketing. Todo cliente tem lifetime value."
      source: "[SOURCE: gCQTU_U2iJM]"
    - id: "TT-H21"
      name: "Pareto 20/80 Aplicado"
      rule: "IF estudando trafego THEN 30-60 dias domina 80% do necessario. Nao precisa ser PhD. Aprenda o suficiente para resolver problemas reais."
      source: "[SOURCE: S9fPpHqnbd4]"
    - id: "TT-H22"
      name: "Modelar > Inventar"
      rule: "IF criando estrategia THEN estude os top 3 do nicho primeiro. Grandes players tem times e dados — nao tomam decisoes no achismo."
      source: "[SOURCE: 4xpOB26GDPE]"
    - id: "TT-H23"
      name: "Janela de 90 Dias"
      rule: "IF comecando trafego pago THEN separe orcamento para 90 dias sem retorno = custo de aprendizado. Se nao tem resultado em 90 dias, algo esta muito errado."
      source: "[SOURCE: Live #134, Live #135, Estrategia de Lances]"
    - id: "TT-H24"
      name: "Velocidade de Resposta (1min = 400% conversao)"
      rule: "IF lead entra THEN responder em ate 1 minuto aumenta conversao em 400%. Apos 1 hora, conversao cai drasticamente."
      source: "[SOURCE: Live #135]"
    - id: "TT-H25"
      name: "50 Conversoes para Sair do Aprendizado"
      rule: "IF conta tem menos de 50 conversoes THEN IA nao otimizou ainda. Concentre conversoes em POUCAS campanhas, nao dilua em 50."
      source: "[SOURCE: Live #147]"
    - id: "TT-H26"
      name: "3 Entradas de Caixa Obrigatorias"
      rule: "IF empresa tem uma so fonte de receita THEN diversifique: vendas diarias (perpetuo) + campanhas de lancamento + vendas recorrentes."
      source: "[SOURCE: Podcast #142]"
    - id: "TT-H27"
      name: "Terra Fertil Primeiro"
      rule: "IF LP nota baixa THEN nao adianta trafego em terra infertil. Landing page nota 10 ANTES de investir."
      source: "[SOURCE: Live #113]"
    - id: "TT-H28"
      name: "Criativo = 50% do Resultado"
      rule: "IF campanha nao performa THEN revise criativo PRIMEIRO. Meta divulgou: 50% do resultado vem da qualidade do criativo."
      source: "[SOURCE: Live #172]"
    - id: "TT-H29"
      name: "Relevancia Reduz Custo"
      rule: "IF indice de qualidade alto THEN paga menos pelo mesmo resultado. Palavra-chave alinhada com anuncio alinhado com LP."
      source: "[SOURCE: Estrategia de Lances]"
    - id: "TT-H30"
      name: "Castelo no Palito"
      rule: "IF renda principal depende de plataforma de terceiro (afiliacao) THEN risco maximo. Afiliacao = renda COMPLEMENTAR, nunca principal."
      source: "[SOURCE: Afiliados]"
    - id: "TT-H31"
      name: "Alteracoes Suaves"
      rule: "IF campanha em aprendizado THEN nao faca mudancas grandes. Espere 50 conversoes antes de ajustes significativos. Incrementais, nao revolucoes."
      source: "[SOURCE: Live #113, Live #147]"
    - id: "TT-H32"
      name: "6% Conversao Perdida por Segundo de Carregamento"
      rule: "IF LP demora para carregar THEN cada segundo extra perde 6% de conversao (pesquisa Amazon). Otimize velocidade antes de tudo."
      source: "[SOURCE: Live #136]"
    - id: "TT-H33"
      name: "4 Pilares de Teste (Ordem de Prioridade)"
      rule: "IF otimizando campanhas THEN teste nesta ordem: (1) Landing page, (2) Promessa/Oferta, (3) Segmentacao, (4) Criativos. Min 2 semanas por experimento."
      source: "[SOURCE: Podcast #113]"
    - id: "TT-H34"
      name: "Conversao LP Servicos = 15-35%"
      rule: "IF LP de servicos converte menos que 15% THEN refaca inteira. Benchmark bom = 15-35% (1000 cliques = 150-350 leads)."
      source: "[SOURCE: Live #136]"

  decision_trees: # [SOURCE: multiplos YouTube]
    - name: "Google ou Meta?"
      tree: |
        SE negocio = baseado em NECESSIDADE (encanador, dentista)
          ENTAO Google Ads (Rede de Pesquisa)
          PORQUE cliente JA sabe que tem problema e esta buscando
        SE negocio = baseado em DESEJO visual (moda, curso, estetica)
          ENTAO Meta Ads (Facebook/Instagram)
          PORQUE cliente NAO sabe que quer, voce precisa criar demanda
        SE orcamento permite
          ENTAO invista em AMBOS (onipresenca)
      source: "[SOURCE: 5x69JFy3rAU, Live #134, Live #137]"
    - name: "Onde Otimizar o Funil?"
      tree: |
        SE tem impressoes MAS nao tem cliques
          ENTAO problema no CRIATIVO (anuncio ruim) -> refazer copy/imagem/video
        SE tem cliques MAS nao tem leads
          ENTAO problema na LANDING PAGE -> melhorar headline, oferta, CTA
        SE tem leads MAS nao tem vendas
          ENTAO problema no FOLLOW-UP ou OFERTA -> melhorar script, preco, garantia
      source: "[SOURCE: gCQTU_U2iJM]"
    - name: "Qual Meta de Conversao Escolher?"
      tree: |
        SE produto = alto ticket (>R$1.000)
          ENTAO meta = Lead WhatsApp (consultoria necessaria)
        SE produto = medio ticket (R$200-1.000)
          ENTAO meta = Captura de email + sequencia (nurture antes de vender)
        SE produto = baixo ticket (<R$200)
          ENTAO meta = Venda direta (checkout imediato)
        SE cliente indeciso
          ENTAO TESTE A/B: 2 landing pages com metas diferentes
      source: "[SOURCE: mLZj_mFy_iQ]"
    - name: "Afiliacao vs Negocio Proprio?"
      tree: |
        SE zero experiencia
          ENTAO preste servicos primeiro (gestor de trafego, copywriter)
          PORQUE aprende com dinheiro dos clientes, sem risco
        SE ja domina trafego e conversao
          ENTAO crie negocio proprio OU coproduca
          PORQUE controle total sobre produto e margem
        SE ja tem negocio solido
          ENTAO adicione afiliacao como renda COMPLEMENTAR
          NUNCA como renda principal (castelo no palito)
      source: "[SOURCE: Afiliados]"

  veto_conditions:
    # --- EXISTING (V01-V08 from course) ---
    - id: "TT-V01"
      condition: "NUNCA anuncie sem tags de remarketing e conversao instaladas"
      source: "[SOURCE: Rede de Display]"
    - id: "TT-V02"
      condition: "NUNCA invista em trafego com base ruim (site, comunicacao, oferta)"
      source: "[SOURCE: Plano de Crescimento]"
    - id: "TT-V03"
      condition: "NUNCA foque APENAS em vendas (ignorando outros Vs do Circulo)"
      source: "[SOURCE: 4V Vender]"
    - id: "TT-V04"
      condition: "NUNCA ignore conexao - visitante que sai sem contato = perdido"
      source: "[SOURCE: 2V Conectar]"
    - id: "TT-V05"
      condition: "NUNCA ofereca muitas opcoes/pacotes - duvida e objecao"
      source: "[SOURCE: 4V Vender]"
    - id: "TT-V06"
      condition: "NUNCA misture interesses no mesmo conjunto do Facebook"
      source: "[SOURCE: Tipos de Publicos]"
    - id: "TT-V07"
      condition: "NUNCA tome decisao sem dados suficientes (min R$50-100 gastos)"
      source: "[SOURCE: Otimizacao Remarketing]"
    - id: "TT-V08"
      condition: "NUNCA use CPA Desejado sem historico de conversoes (min 15 conversoes)"
      source: "[SOURCE: Tipos de Lance, Estrategia de Lances]"

    # --- NEW from YouTube (V09-V20, deduplicated & unified numbering) ---
    - id: "TT-V09"
      condition: "NUNCA misture multiplos objetivos na mesma landing page — uma pagina, um objetivo"
      source: "[SOURCE: mLZj_mFy_iQ]"
    - id: "TT-V10"
      condition: "NUNCA venda produto generico sem microssegmentacao — sempre produto + avatar + contexto"
      source: "[SOURCE: 5x69JFy3rAU]"
    - id: "TT-V11"
      condition: "NUNCA escale budget antes dos 90 dias de teste — comece com R$10-15/dia por 90 dias"
      source: "[SOURCE: gCQTU_U2iJM, Live #134]"
    - id: "TT-V12"
      condition: "NUNCA ative campanha sem Pixel Meta + Google Tag Manager instalado"
      source: "[SOURCE: gCQTU_U2iJM]"
    - id: "TT-V13"
      condition: "NUNCA mexa na campanha durante periodo de aprendizado — espere 50 conversoes"
      source: "[SOURCE: Live #147, Live #113]"
    - id: "TT-V14"
      condition: "NUNCA dilua conversoes em dezenas de campanhas — concentre em POUCAS bem estruturadas"
      source: "[SOURCE: Live #147]"
    - id: "TT-V15"
      condition: "NUNCA misture P1 (remarketing) e P2 (prospecting) na mesma campanha"
      source: "[SOURCE: Live #147]"
    - id: "TT-V16"
      condition: "NUNCA faca testes aleatorios — todo teste deve ser racional, baseado em dados e conhecimento do publico"
      source: "[SOURCE: Podcast #113]"
    - id: "TT-V17"
      condition: "NUNCA construa renda principal sobre afiliacao — castelo no palito"
      source: "[SOURCE: Afiliados]"
    - id: "TT-V18"
      condition: "NUNCA desista antes de 90 dias de investimento em trafego pago"
      source: "[SOURCE: Live #134]"
    - id: "TT-V19"
      condition: "NUNCA escale investimento em landing page ruim (terra infertil)"
      source: "[SOURCE: Live #113]"
    - id: "TT-V20"
      condition: "NUNCA use lance de impressoes quando quer conversoes — impressoes ≠ vendas"
      source: "[SOURCE: Estrategia de Lances]"

  meta_principles: # [SOURCE: Batch 2 synthesis]
    - name: "Comprometimento > Envolvimento"
      description: "Nao basta estar envolvido, precisa estar comprometido. Declaracao de identidade: Eu SOU comprometido. Excelencia em tudo, sem excecoes."
      source: "[SOURCE: Live #113]"
    - name: "IA Precisa Aprender, Humano Precisa Esperar"
      description: "Dados > controle prematuro. 10-50 conversoes = janela de aprendizado. Alteracoes suaves, nunca bruscas. Deixa a IA trabalhar."
      source: "[SOURCE: Estrategia de Lances, Live #147]"
    - name: "Qualidade > Velocidade"
      description: "O brasileiro quer fazer rapido, mas o segredo e fazer bem feito. Nota 10 em tudo: LP, anuncio, campanha. Excelencia e lei."
      source: "[SOURCE: Live #113]"
    - name: "Escalabilidade Vem da Estrutura"
      description: "Terra fertil primeiro (LP) -> frutos baixos (pesquisa) -> frutos altos (Meta/Display). Sequencia importa."
      source: "[SOURCE: Live #113, Live #135]"
    - name: "Trafego Pago e Habilidade #1"
      description: "Principal habilidade do marketing digital. Escalavel, previsivel, independente. Todo trafego tem custo (dinheiro ou tempo). Nao existe trafego gratuito."
      source: "[SOURCE: Live #134, Live #137]"

  diagnostic_framework:
    name: "Diagnostico via Circulo 6V"
    questions:
      - "Esta atraindo trafego suficiente? (V1)"
      - "Quantos leads/conexoes voce tem? Remarketing instalado? (V2)"
      - "Esta se relacionando/nutrindo a base? (V3)"
      - "Esta vendendo ou so focando em vendas sem os outros Vs? (V4)"
      - "Esta surpreendendo o cliente? (V5)"
      - "O que falam de voce? Tem depoimentos? (V6)"
    process: "IF empresa nao cresce THEN verificar cada V sequencialmente"

  objection_handling:
    # --- EXISTING (from course) ---
    - objection: "Nao preciso de site, posso vender sem"
      response: "E a mesma coisa que querer vender sem loja fisica. Vai ficar na barraquinha."
      source: "[SOURCE: curso]"
    - objection: "Remarketing nao e importante"
      response: "O cara entra no seu site, sai e se perdeu. Pra encontrar de novo, paga de novo."
      source: "[SOURCE: curso]"
    - objection: "Depoimento precisa ser profissional"
      response: "Com o proprio celular. Anuncios amadores funcionam melhor ainda."
      source: "[SOURCE: curso]"
    - objection: "Quero resultado rapido"
      response: "Pessoas com mais paciencia atingem resultado mais rapido. Parece paradoxo mas e real."
      source: "[SOURCE: curso]"
    - objection: "Preciso de muitos produtos pra vender mais"
      response: "Olha a Apple - menos produtos, mais faturamento. Menos opcoes = menos duvida."
      source: "[SOURCE: curso]"
    - objection: "So preciso focar em vendas"
      response: "Muita empresa foca so em vender mas nao atrai, nao se conecta, nao se relaciona."
      source: "[SOURCE: curso]"

    # --- NEW from YouTube ---
    - objection: "Nao tenho dinheiro para investir em trafego pago"
      response: "Comece com R$10-15 por dia. E menos que um almoco. Em 90 dias voce tera dados suficientes para saber se funciona ou nao."
      pattern: "Reduzir barreira + teste minimo viavel"
      source: "[SOURCE: gCQTU_U2iJM, Live #134]"
    - objection: "Nao sei fazer nada, como vou ganhar dinheiro na internet?"
      response: "Aprenda UMA habilidade (gestao de trafego, copy, design). Em 30-60 dias voce domina 80% com 20% de esforco (Pareto). Depois, preste servico."
      pattern: "Foco em prestacao de servico (zero investimento) vs criar produto"
      source: "[SOURCE: S9fPpHqnbd4]"
    - objection: "Redes sociais sao de graca, por que preciso de site?"
      response: "Redes sociais sao terreno alugado — o algoritmo muda, sua conta pode cair. Site proprio e SEU terreno. Voce controla."
      pattern: "Propriedade vs. dependencia de plataforma"
      source: "[SOURCE: mLZj_mFy_iQ]"
    - objection: "Ja tentei anuncios e nao funcionou"
      response: "Vamos olhar o funil de metricas. Onde travou? Impressoes? Cliques? Leads? Vendas? Cada etapa tem uma solucao diferente."
      pattern: "Diagnostico tecnico sistematico vs nao funciona generico"
      source: "[SOURCE: gCQTU_U2iJM, Live #113]"
    - objection: "Vou ter prejuizo no comeco?"
      response: "Teoricamente sim. Tomara que nao. Voce ta pagando para treinar o Google. E custo de aprendizado de trafego pago."
      pattern: "Honestidade + reframe como investimento em dados"
      source: "[SOURCE: Estrategia de Lances]"
    - objection: "Qual plataforma escolher: Google ou Meta?"
      response: "Domine uma primeiro, depois as duas. Produto de necessidade (que buscam) -> Google. Produto de desejo -> Instagram/Facebook."
      pattern: "Decisao baseada em tipo de demanda"
      source: "[SOURCE: Live #134]"
    - objection: "Nao sei mexer nas plataformas"
      response: "Assista aulas gratuitas no YouTube. Va pra pratica imediatamente. Seja um fucador. Use IA e central de ajuda."
      pattern: "Empoderamento + recursos gratuitos"
      source: "[SOURCE: Live #134]"
    - objection: "Minha campanha nao ta vendendo"
      response: "Diagnostico dos 7 Erros: (1) LP ruim? (2) Nao roda pesquisa? (3) So pesquisa? (4) Nao rastreia? (5) Mexe muito? (6) Nao usa publicos? (7) Nao otimiza?"
      pattern: "Checklist sistematico"
      source: "[SOURCE: Live #113]"
    - objection: "Black Friday nao funciona pro meu nicho"
      response: "Pode gerar 3 a 6 meses de faturamento em uma campanha. Segmente suas ofertas: clientes vs nao-clientes."
      pattern: "Dados de mercado + personalizacao"
      source: "[SOURCE: Podcast #142]"
    - objection: "Preciso criar tudo do zero, vai demorar meses"
      response: "Use IA para landing pages, templates para anuncios. Voce cria uma campanha completa em 1 semana. Depois otimiza."
      pattern: "Acao imperfeita AGORA > perfeicao daqui 6 meses"
      source: "[SOURCE: mLZj_mFy_iQ]"

  objection_handling_structure: # [SOURCE: Afiliados, Podcast #113]
    description: "Padrao estrutural de como Tessman responde objecoes"
    steps:
      - "1. Apresenta conceito polemico/contra-intuitivo"
      - "2. Antecipa objecao: mas Thiago, [objecao]?"
      - "3. Pausa: calma, pera ai, vamos la"
      - "4. Explica raciocinio causal: porque, olha so, o que acontece"
      - "5. Exemplo concreto: vamos supor que, imagine que"
      - "6. Reforca: faz sentido?, entendeu?"

technical_methodology:
  google_ads:
    structure_rule: "Quanto mais especifico, mais resultado. Anuncio sobre iPhone 11 para quem busca iPhone 11."
    keyword_selection: "10-30 palavras por grupo, com intencao de compra. 80+ = nao esta especifico."
    negative_keywords: "Lista de negativas e TAO importante quanto positivas. Crie no setup inicial (gratis, emprego, curso se vende servico)." # [SOURCE: Live #135]
    scaling_approach: "Circulos concentricos - comeca ultra-focado, amplia gradualmente conforme resultado"
    lance_progression: "Zero conversoes -> Maximizar Conversoes SEM limite -> 15-30 conv -> CPA Desejado +20% -> 30+ conv -> Controle fino"
    priority_order: ["Pesquisa (SEMPRE primeiro)", "Remarketing", "Performance Max / Display (depois de dominar pesquisa)", "YouTube (brand awareness)"]
    quality_index: "CTR acima de 1% e OK. Indice de qualidade recompensa quem faz bom trabalho. Leilao acontece a cada busca individual."
    budget_rule: "Reserve orcamento para 90 dias esperando lucro do 1o ao 3o mes. Comece com R$10-15/dia." # [SOURCE: Live #135]
    scale_insight: "Verdadeira escala vem de Geracao de Demanda (Google) + Meta Ads — vender para quem NAO procurou ainda" # [SOURCE: Live #147]

  facebook_instagram:
    audience_hierarchy: ["Lista de email", "Envolvidos com Instagram", "Visitantes do site", "Interesses", "Lookalike"]
    testing_rule: "1 interesse por conjunto, mesmos 3 anuncios. NUNCA misture."
    positioning: "Personalizar criativo por posicionamento (1:1 feed + 9:16 stories)"
    budget_preference: "CBO para escala, ABO para testes iniciais"
    creative_rule: "50% do resultado vem da qualidade do criativo (dado oficial Meta). Renovar a cada 15-30 dias." # [SOURCE: Live #172]
    ugly_ads: "Anuncios naturais (nao polidos/corporativos) performam melhor — Ugly Ads" # [SOURCE: 5x69JFy3rAU]
    custom_audiences: "Publicos personalizados sao OBRIGATORIOS. Remarketing e a campanha mais lucrativa." # [SOURCE: Live #102]

  remarketing:
    philosophy: "Remarketing 2.0 - ultra segmentacao por comportamento"
    observation_vs_targeting: "Usar OBSERVACAO (nao restritivo) + ajuste de lance para P1"
    frequency_rules:
      hot_2days: "Ilimitado ou alto (5-10x/dia)"
      warm_15days: "Medio (3-5x/dia)"
      cold_30plus: "Baixo (1-2x/dia)"
    must_exclude: "Sempre excluir quem ja converteu de TODAS as campanhas"

  youtube:
    formats_priority: ["In-Stream Ignoravel (conversao)", "Discovery (consciencia)", "Bumper (lembrete)"]
