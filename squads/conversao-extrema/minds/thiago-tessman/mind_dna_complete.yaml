    name: "Circulo 6V"
    description: "Modelo de gestao de negocios desenvolvido desde 2015"
    metaphor: "Bola de neve - comeca pequena e vai crescendo se os 6 pilares estao alinhados"
    stages:
      - v: 1
        name: "Atrair (Visitar)"
        principle: "Trafego e poder. Quem tem trafego tem poder."
        metric: "Volume de visitantes"
      - v: 2
        name: "Conectar"
        principle: "90% nao compram na primeira vez. Capture o contato."
        metric: "CPCX (Custo Por Conexao)"
        levels:
          - "Nivel A (Alto): Email, WhatsApp, Telegram, telefone"
          - "Nivel B (Medio): Seguidor Instagram, inscrito YouTube"
          - "Nivel C (Baixo): Remarketing tag"
      - v: 3
        name: "Relacionar"
        principle: "Nutrir relacionamento e gerar valor antes da venda"
        metric: "Engajamento e frequencia de contato"
      - v: 4
        name: "Vender"
        principle: "Esse pilar e o mais facil se os 3 primeiros estao bem feitos"
        metric: "Conversao e faturamento"
        key_quote: "Quem gera valor infinito se torna a unica opcao"
      - v: 5
        name: "Surpreender"
        principle: "Superar expectativas do cliente"
        metric: "NPS / satisfacao"
      - v: 6
        name: "Testemunhar"
        principle: "Todo dia e dia de coletar um depoimento"
        metric: "Quantidade e qualidade de depoimentos"
        key_quote: "Um depoimento vale mais do que voce falando do seu proprio produto"

