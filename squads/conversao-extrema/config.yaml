# Quality Standards
quality_standards:
  # Veto Conditions (Campaign-Level)
  veto_conditions:
    - name: "No Base da Multiplicação"
      rule: "Campaign MUST have validated offer + message + audience before spending"
      severity: "BLOCKER"

    - name: "Budget Too Low"
      rule: "Minimum R$500/month for testing Google Search, R$1000/month for Meta"
      severity: "BLOCKER"

    - name: "No Keyword Specificity"
      rule: "Google Search campaigns MUST have 10-30 keywords per group (ultra-specific)"
      severity: "BLOCKER"

    - name: "Facebook Generic Interests"
      rule: "Facebook campaigns MUST use single interest stacking, not broad interests"
      severity: "BLOCKER"

  # Acceptance Criteria
  acceptance_criteria:
    google_search:
      - "10-30 keywords per ad group"
      - "Negative keywords list (min 50 words)"
      - "Maximizar Conversões SEM LIMITE (0-15 conv) → CPA Desejado +20% (15-30 conv) → Controle fino (30+)"
      - "Search terms reviewed daily (first 2 weeks)"

    meta_ads:
      - "Single interest per ad set (no stacking during testing)"
      - "Problem-focused creative (PAS framework)"
      - "Audience size 500k-2M (Brazil targeting)"
      - "Daily budget min R$30-50 per ad set"

    copy:
      - "PAS framework applied"
      - "Word Mapping from audience research"
      - "Problem → Solution flow clear"
      - "CTA specific and measurable"

# Validation Scripts
validation_scripts:
  campaign_validator:
    path: scripts/validate-campaign.py
    usage: "python squads/conversao-extrema/scripts/validate-campaign.py --type [google|meta] --config campaign.yaml"
    trigger: "Before launching any campaign"
    returns: "PASS (exit 0) or FAIL (exit 1)"

  roi_calculator:
    path: scripts/calculate-roi.py
    usage: "python squads/conversao-extrema/scripts/calculate-roi.py --spend X --revenue Y"
    trigger: "Before scaling decisions"
    returns: "ROI metrics + recommendation"

