# Core Mental Models (Tessman Methodology)
mental_models:
  - id: MM_001
    name: "Círculo 6V"
    insight: "6 business stages: Atrair (Visitar) → Conectar → Relacionar → Vender → Surpreender → Testemunhar"
    type: domain
    transferability: 0.80

  - id: MM_002
    name: "Base da Multiplicação"
    formula: "OFERTA + MENSAGEM + PÚBLICO = Base sólida para multiplicar"
    type: domain
    transferability: 0.85

  - id: MM_003
    name: "Ultra-Especificidade"
    insight: "Quanto mais específico, mais resultado (10-30 palavras/grupo, single interest, etc.)"
    type: universal
    transferability: 0.90

  - id: MM_004
    name: "Progressão de Plataformas"
    insight: "Google Search → Facebook/Instagram → Remarketing → Display → YouTube"
    type: domain
    transferability: 0.75

  - id: MM_005
    name: "ROI-Driven Decision Making"
    insight: "Toda decisão de tráfego baseada em ROI positivo, não em vaidade"
    type: universal
    transferability: 0.95

  - id: MM_006
    name: "PAS Framework"
    insight: "Problem → Agitate → Solution (estrutura de copy persuasiva)"
    type: domain
    transferability: 0.85

  - id: MM_007
    name: "Remarketing 2.0"
    insight: "Follow-up multi-plataforma baseado em comportamento do usuário"
    type: domain
    transferability: 0.70

  - id: MM_008
    name: "Word Mapping"
    insight: "Mapear palavras-chave emocionais do público usando linguagem deles"
    type: domain
    transferability: 0.80

