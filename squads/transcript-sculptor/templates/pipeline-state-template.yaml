# Pipeline State Template
# Location: {output_folder}/pipeline-state.yaml
# Purpose: Enable partial reprocessing by tracking completed stages and artifacts
# Generated by: sculptor-chief agent, updated after each stage completion

pipeline_state:
  last_completed_stage: "stage2"               # Last successfully completed stage
  last_run_at: "2026-02-22T14:10:00Z"          # Last execution timestamp (ISO-8601)
  input_folder: "/path/to/input"               # Original input folder
  output_folder: "/path/to/output"             # Output directory

  stages_completed:
    - "stage0"                                 # Ingestion complete
    - "stage1"                                 # Analysis complete
    - "stage2"                                 # Editing complete

  stages_pending:
    - "stage3"                                 # Validation pending
    - "stage4"                                 # Delivery pending

  can_resume_from: "stage3"                    # Next valid entry point for *reprocess

  artifacts:
    # Stage 0 outputs
    raw_files:
      - "raw/palestra-dia1.md"
      - "raw/material-complementar.md"

    # Stage 1 outputs
    analysis_maps:
      - "analysis/palestra-dia1-analysis-map.yaml"
      - "analysis/material-complementar-analysis-map.yaml"

    raw_chunks:
      - "chunks/palestra-dia1-chunk-001.md"
      - "chunks/palestra-dia1-chunk-002.md"
      - "chunks/palestra-dia1-chunk-003.md"
      - "chunks/material-complementar-chunk-001.md"

    # Stage 2 outputs
    edited_chunks:
      - "chunks/palestra-dia1-chunk-001-edited.md"
      - "chunks/palestra-dia1-chunk-002-edited.md"
      - "chunks/palestra-dia1-chunk-003-edited.md"
      - "chunks/material-complementar-chunk-001-edited.md"

    # Stage 3 outputs (empty until validation completes)
    quality_reports: []
    # Example when completed:
    # - "reports/palestra-dia1-quality-report.yaml"
    # - "reports/material-complementar-quality-report.yaml"

    # Stage 4 outputs (null until delivery completes)
    masterpiece: null
    # Example when completed:
    # - "palestra-dia1-masterpiece.md"
    # - "material-complementar-masterpiece.md"

  # Metadata for tracking
  metadata:
    pipeline_version: "1.0.0"                  # Workflow version
    total_input_files: 3                       # Original input file count
    total_raw_files: 2                         # Successfully converted files
    total_chunks: 4                            # Total chunks created
    total_words_raw: 42350                     # Total words in raw files

  # Partial reprocessing history
  reprocessing_history:
    - timestamp: "2026-02-22T14:00:00Z"
      stage: "stage0"
      reason: "Initial full run"
    # Example of partial reprocessing:
    # - timestamp: "2026-02-22T15:30:00Z"
    #   stage: "stage2"
    #   reason: "Re-edit with different editorial rules"
