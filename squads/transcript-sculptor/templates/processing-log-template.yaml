# Processing Log Template
# Location: {output_folder}/processing-log.yaml
# Purpose: Track timing, metrics, and status for each pipeline stage
# Generated by: sculptor-chief agent during pipeline execution

processing_log:
  started_at: "2026-02-22T14:00:00Z"           # Pipeline start (ISO-8601)
  completed_at: "2026-02-22T14:12:30Z"         # Pipeline completion (ISO-8601)
  total_duration_seconds: 750                  # Total pipeline time
  input_folder: "/path/to/input"               # Original input folder
  output_folder: "/path/to/output"             # Output directory

  stages:
    # Stage 0: Ingestion (doc-converter)
    - name: "ingestion"
      started_at: "2026-02-22T14:00:00Z"
      completed_at: "2026-02-22T14:01:30Z"
      duration_seconds: 90
      files_processed: 3                       # Total files attempted
      files_successful: 3                      # Successfully converted
      files_failed: 0                          # Failed conversions
      conversion_rate: 100.0                   # Success percentage
      status: "success"                        # success | failed | partial

    # Stage 1: Analysis (transcript-analyst)
    - name: "analysis"
      started_at: "2026-02-22T14:01:30Z"
      completed_at: "2026-02-22T14:04:00Z"
      duration_seconds: 150
      files_analyzed: 3                        # Raw .md files analyzed
      chunks_created: 6                        # Total chunks created
      avg_chunk_size: 7200                     # Average words per chunk
      status: "success"

    # Stage 2: Editing (transcript-editor)
    - name: "editing"
      started_at: "2026-02-22T14:04:00Z"
      completed_at: "2026-02-22T14:10:00Z"
      duration_seconds: 360
      chunks_edited: 6                         # Successfully edited chunks
      chunks_retried: 0                        # Chunks requiring retry
      avg_edit_time_seconds: 60                # Average time per chunk
      status: "success"

    # Stage 3: Validation (quality-guardian)
    - name: "validation"
      started_at: "2026-02-22T14:10:00Z"
      completed_at: "2026-02-22T14:11:30Z"
      duration_seconds: 90
      verdict: "PASS"                          # PASS | CONCERNS | FAIL
      content_preservation: 98.2               # Percentage
      dna_preservation: 9.1                    # Score (0-10)
      structural_coherence: 8.8                # Score (0-10)
      overall_quality: 8.7                     # Aggregate score
      status: "success"

    # Stage 4: Delivery (sculptor-chief)
    - name: "delivery"
      started_at: "2026-02-22T14:11:30Z"
      completed_at: "2026-02-22T14:12:30Z"
      duration_seconds: 60
      chunks_merged: 6                         # Chunks merged
      overlap_removed_words: 180               # Words removed during overlap detection
      output_file: "palestra-dia1-masterpiece.md"
      final_word_count: 41580                  # Final document word count
      toc_entries: 15                          # Table of contents entries
      status: "success"

  warnings:
    - stage: "editing"
      chunk: "chunk-003"
      message: "Low DNA score (8.5) - below target (9.0)"
      timestamp: "2026-02-22T14:07:30Z"
      severity: "low"

    - stage: "ingestion"
      file: "slides.pptx"
      message: "File format not supported (PPTX)"
      timestamp: "2026-02-22T14:01:00Z"
      severity: "medium"

  errors: []
  # Example error entry:
  # - stage: "validation"
  #   message: "Quality gate FAIL - DNA preservation 7.5 < threshold 9.0"
  #   timestamp: "2026-02-22T14:11:00Z"
  #   severity: "critical"
  #   action: "Pipeline halted, returning to Stage 2 for re-editing"
