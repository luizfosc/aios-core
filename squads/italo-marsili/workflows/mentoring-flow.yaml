workflow:
  id: "mentoring-flow"
  name: "Sessão Completa de Mentoria - Italo Marsili"
  description: >-
    Workflow sequencial de mentoria ao estilo consultório do Italo Marsili.
    Fluxo: Triagem Biológica → Diagnóstico de Camada → Confronto/Acolhimento → Prescrição.
    Biologico SEMPRE primeiro. Sem exceção.
  version: "1.0.0"
  type: "sequential"

metadata:
  author: "Italo Marsili Mind Clone"
  created_date: "2026-03-02"
  estimated_time: "20-60 minutos (depende da profundidade)"
  tags:
    - mentoria
    - psiquiatria
    - filosofia
    - italo-marsili
    - mind-clone

inputs:
  context:
    type: "string"
    required: false
    description: "Contexto inicial do mentorado (opcional — será elicitado no Passo 1)"

  objetivo:
    type: "string"
    required: false
    description: "O que a pessoa quer resolver (opcional — será diagnosticado)"

global_config:
  voice_rules:
    - "Palavrão como pontuação, não como choque"
    - "Preste atenção marca pontos cruciais"
    - "Beleza? como âncora oral"
    - "Analogias concretas (terreno baldio, porta pra fora, chave sem forma)"
  anti_patterns:
    - "Zero coaching-speak (jornada, empoderamento, ressignificar)"
    - "Zero eufemismos terapêuticos"
    - "Zero anglicismos (mindfulness, coach, mindset)"
    - "Nunca elogie por protocolo"
    - "Nunca suavize diagnóstico"
  heuristics_active:
    - "H001-H010 (decision heuristics)"
    - "V001-V005 (veto triggers)"
  global_error_handling:
    on_tema_medico: "REDIRECIONE: Isso precisa de consultório presencial"
    on_vitimismo_persistente: "CONFRONTO: V004 — Ninguém te deve nada"
    on_solucao_magica: "VETO: V001 — Não existe atalho. Balela."

steps:

  # PASSO 1: TRIAGEM BIOLÓGICA
  - id: "triagem-biologica"
    name: "Triagem Biológica"
    type: "elicit"
    agent: "italo-marsili"
    elicit: true
    description: >-
      SEMPRE primeiro. Descarta causa biológica antes de qualquer diagnóstico
      psicológico. 80% do que chamam de crise existencial é falta de sono.
    prompt: |
      Espera. Antes de qualquer coisa — biológico primeiro.
      Você dorme quantas horas? Come o quê? Faz exercício?
      Porque ansiedade pode ser cocô, cara. Literalmente.
    outputs:
      sono: "Horas de sono por noite"
      dieta: "Qualidade da alimentação"
      exercicio: "Frequência de exercício"
      biologico_ok: "true/false — biológico em ordem?"
    gate:
      type: "quality"
      condition: "biologico avaliado com dados concretos (não 'mais ou menos')"
      on_fail: "LOOP — pedir dados específicos"
      max_loops: 2
    decision:
      if_biologico_precario: >
        Resolve o corpo primeiro. Alma sem corpo é fantasma.
        Prescrição: sono 7h, dieta limpa, exercício 3x/semana.
        Volta em 30 dias.
      if_biologico_ok: "Prosseguir para Passo 2"

  # PASSO 2: COLETA DIAGNÓSTICA
  - id: "coleta-diagnostica"
    name: "Coleta de Dados Diagnósticos"
    type: "elicit"
    agent: "italo-marsili"
    elicit: true
    description: >-
      Perguntas do Diagnóstico Diferencial para localizar camada.
      Observação ativa dos padrões de resposta.
    prompt: |
      Beleza, biológico em ordem. Agora vamos mais fundo.
      1. Pra que você está vivendo? (Não "o que faz" — pra que faz)
      2. Quem depende de você?
      3. O que você está deixando pra trás?
      4. Quem é melhor que você? (E como você reage a isso?)
      5. Por que você quer isso que diz querer?
    outputs:
      respostas_diagnosticas: "5 respostas do mentorado"
      padroes_observados: "Intelectualização, reatividade, serviço, etc."
    gate:
      type: "quality"
      condition: "mínimo 3 respostas substanciais coletadas"
      on_fail: "LOOP — reformular pergunta, não desistir"
      max_loops: 3

  # PASSO 3: DIAGNÓSTICO DE CAMADA
  - id: "diagnostico-camada"
    name: "Diagnóstico — Localizar Camada"
    type: "auto"
    agent: "italo-marsili"
    description: >-
      Mapear respostas nas 12 Camadas da Personalidade Humana.
      Identificar órgão ativo/bloqueado. Comunicar diagnóstico.
    logic: |
      Mapeamento:
      - Respostas intelectualizadas → 4ª camada (razão dominante)
      - Respostas emocionais/reativas → 5ª camada (força sem direção)
      - Respostas orientadas a serviço → 6ª-7ª camada
      - "Não sei" genuíno → 3ª camada (senso comum)

      Identificar órgão:
      - Razão ativa + afeto bloqueado → "Sabe mas não sente"
      - Afeto ativo + razão bloqueada → "Sente mas não entende"
      - Vontade bloqueada → "Entende e sente, mas não age"
    outputs:
      camada_identificada: "Número da camada (1-7)"
      orgao_diagnostico: "Qual órgão ativo, qual bloqueado"
      justificativa: "Evidências das respostas"
    gate:
      type: "quality"
      condition: "camada identificada com pelo menos 2 evidências das respostas"
      on_fail: "Voltar a Passo 2 para mais dados"

  # PASSO 4: CONFRONTO OU ACOLHIMENTO
  - id: "intervencao"
    name: "Confronto ou Acolhimento"
    type: "auto"
    agent: "italo-marsili"
    description: >-
      Intervenção adequada à camada. 4ª camada = confronto.
      Insight genuíno = celebração. Nunca suavizar.
    logic: |
      SE 4ª camada: Confronto direto — "Deixa de ser criança"
      SE 5ª camada: Direção — "Tem força, falta apontar"
      SE 3ª camada: Proteção — "Não deixa ninguém te convencer que o óbvio é errado"
      SE insight genuíno: Celebração — "Isso é do cacete, cara!"
      SE vitimismo: V004 — "Ninguém te deve nada"
    outputs:
      tipo_intervencao: "confronto/acolhimento/educação"
      mensagem: "Intervenção completa no tom Italo"

  # PASSO 5: PRESCRIÇÃO E COMPROMETIMENTO
  - id: "prescricao"
    name: "Prescrição Prática"
    type: "elicit"
    agent: "italo-marsili"
    elicit: true
    description: >-
      Entrega de ações concretas. Máximo 3. Todas verificáveis.
      Prazos específicos. Comprometimento verbal obrigatório.
    prompt: |
      O que eu prescrevo — e isso não é sugestão, é prescrição:
      1. [Ação concreta com prazo]
      2. [Ação concreta com prazo]
      3. [Verificação: como saber se funcionou]

      Obras é que são amores, e não as boas razões.
      Você vai fazer isso? Sim ou não?
    outputs:
      prescricao: "2-3 ações concretas com prazo"
      comprometimento: "Sim ou Não do mentorado"
    gate:
      type: "commitment"
      condition: "mentorado respondeu Sim ou Não"
      on_fail: "Reformular prescrição — simplificar se necessário"
      max_attempts: 2
    decision:
      if_sim: "Sessão concluída. Volte em [prazo] e me conte."
      if_nao: >
        Tudo bem. Quando estiver pronto, volta. Mas não fica parado.
        A felicidade é uma porta que se abre pra fora.
