name: wf-quick-extract
version: "1.0.0"
description: |
  Pipeline simplificado para extracao rapida de regras de negocio de sistemas pequenos (<10k LOC).
  3 fases (vs 6 do pipeline completo). Use para prototipos, POCs ou modulos isolados.

trigger: "*quick-extract"
orchestrator: bre-chief

# Global enforcement
enforcement:
  checkpoint_policy: "no_phase_skip"
  veto_behavior: "blocking"
  max_retries_per_phase: 1
  max_duration_minutes: 60
  fallback_on_max_retries: "escalate_to_human"
  metrics_logging: true

# Applicability guard
applicability:
  max_loc: 10000
  max_modules: 3
  description: "For systems > 10k LOC or > 3 modules, use wf-extract-rules instead"

phases:
  - id: phase_0_triage_extract
    name: "Triage & Extract"
    agents:
      - bre-chief     # Triage
      - harry-sneed   # Extraction (or michael-feathers based on stack)
    description: "Combined triage and extraction for small systems"
    inputs:
      - system_description
      - codebase_access
    input_validation:
      - field: system_description
        required: true
        min_length: 50
      - field: codebase_access
        required: true
        type: "path_or_url"
    actions:
      - "Identify system stack and complexity"
      - "Quick seam analysis (top-level only)"
      - "Extract business rules with source traceability"
      - "Identify dead code and exclude"
      - "Group rules by conclusion (basic families)"
    outputs:
      - system_profile
      - raw_business_rules
      - source_traceability_map
      - basic_rule_families
    checkpoint:
      type: human_review
      blocking: true
      question: "Review extracted rules. Are they accurate and complete for this module?"
      veto_conditions:
        - condition: "System stack not identified"
          severity: critical
        - condition: "Less than 50% of expected rules extracted"
          severity: critical
        - condition: "No source traceability"
          severity: critical
    fallback:
      on_veto: "Re-extract with broader analysis"
      on_timeout: "Export partial rules with gaps flagged"

  - id: phase_1_formalize
    name: "Formalize & Standardize"
    agents:
      - barbara-von-halle  # Normalization
      - ronald-ross        # RuleSpeak
    depends_on: phase_0_triage_extract
    description: "Normalize and standardize in single pass"
    inputs:
      - raw_business_rules
      - basic_rule_families
    input_validation:
      - field: raw_business_rules
        required: true
        min_items: 1
    actions:
      - "Apply 3NF normalization to rule families"
      - "Build minimal business glossary"
      - "Rewrite rules in RuleSpeak format"
      - "Trace rules to business motivation"
    outputs:
      - decision_model
      - business_glossary
      - rulespeak_rules
    checkpoint:
      type: auto
      blocking: true
      checks:
        - "All rules assigned to a family"
        - "All tables pass 3NF validation"
        - "Glossary has no undefined terms"
      veto_conditions:
        - condition: "More than 30% of rules fail normalization"
          severity: critical
        - condition: "Business glossary has undefined terms"
          severity: critical
    fallback:
      on_veto: "Decompose overlapping families, re-normalize"
      on_timeout: "Flag non-normalized rules for manual review"

  - id: phase_2_verify
    name: "Verify & Export"
    agents:
      - jan-vanthienen
      - james-taylor
    depends_on: phase_1_formalize
    description: "Quick verification and catalog generation"
    inputs:
      - rulespeak_rules
      - decision_model
      - business_glossary
    input_validation:
      - field: rulespeak_rules
        required: true
        min_items: 1
      - field: decision_model
        required: true
    actions:
      - "Check completeness and consistency of decision tables"
      - "Export to DMN format"
      - "Generate rule catalog"
    outputs:
      - verified_tables
      - dmn_export
      - rule_catalog
    checkpoint:
      type: quality_gate
      blocking: true
      gate: extraction-quality-gate.md
      veto_conditions:
        - condition: "Decision tables have contradictions"
          severity: critical
        - condition: "Completeness check fails"
          severity: critical
    fallback:
      on_veto: "Return contradictory tables for re-normalization"
      on_timeout: "Export partial catalog with gaps flagged"

metrics:
  log_file: "metrics-log.json"
  per_phase:
    - timestamp_start
    - timestamp_end
    - rules_count
    - errors_count
  per_pipeline:
    - total_duration_minutes
    - total_rules_extracted
    - total_rules_formalized

completion_criteria:
  - "All 3 phases completed"
  - "All checkpoints passed"
  - "Rule catalog generated"
  - "DMN export available"
  - "Source traceability maintained"
  - "Zero critical veto conditions unresolved"
  - "Metrics log exported"
