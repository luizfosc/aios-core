name: wf-extract-rules
version: "2.0.0"
description: |
  Pipeline completo de extracao de regras de negocio de sistemas legados.
  6 fases sequenciais com checkpoints, veto conditions e fallback chains.

trigger: "*extract"
orchestrator: bre-chief

# Global enforcement
enforcement:
  checkpoint_policy: "no_phase_skip"
  veto_behavior: "blocking"
  max_retries_per_phase: 2
  max_duration_minutes: 180
  max_waves: 3
  fallback_on_max_retries: "escalate_to_human"
  fallback_on_timeout: "export_partial_with_gaps_flagged"
  metrics_logging: true

phases:
  - id: phase_0_triage
    name: "System Triage"
    agent: bre-chief
    description: "Diagnose legacy system and determine extraction strategy"
    inputs:
      - system_description
      - codebase_access
      - available_documentation
    input_validation:
      - field: system_description
        required: true
        min_length: 50
      - field: codebase_access
        required: true
        type: "path_or_url"
    actions:
      - "Identify system stack (COBOL, Java, .NET, ERP, mixed)"
      - "Estimate codebase size and complexity"
      - "Assess existing documentation quality"
      - "Estimate rule density (rules per KLOC)"
      - "Select extraction pipeline based on system profile"
      - "Identify highest-value modules for quick wins"
    outputs:
      - system_profile
      - extraction_strategy
      - module_priority_list
    checkpoint:
      type: human_review
      blocking: true
      question: "Does the system profile and strategy look correct?"
      veto_conditions:
        - condition: "System stack not identified"
          severity: critical
        - condition: "No module priority defined"
          severity: critical
        - condition: "Codebase access not confirmed"
          severity: critical
    fallback:
      on_veto: "Return to triage with additional system documentation"
      on_timeout: "Escalate to human for manual system assessment"

  - id: phase_1_analysis
    name: "Legacy Code Analysis"
    agent: michael-feathers
    depends_on: phase_0_triage
    description: "Analyze code structure, identify seams and business logic locations"
    inputs:
      - system_profile
      - module_priority_list
    input_validation:
      - field: system_profile
        required: true
      - field: module_priority_list
        required: true
        min_items: 1
    actions:
      - "Run scratch refactoring to understand module structure"
      - "Identify seams (preprocessing, link, object)"
      - "Map dependency graph for priority modules"
      - "Write characterization tests for critical paths"
      - "Identify business logic vs infrastructure code"
      - "Mark extraction points where rules are embedded"
    outputs:
      - seam_map
      - dependency_graph
      - characterization_tests
      - extraction_points
    checkpoint:
      type: human_review
      blocking: true
      question: "Are the identified extraction points correct? Do characterization tests pass?"
      veto_conditions:
        - condition: "No seams identified in any module"
          severity: critical
        - condition: "Characterization tests fail"
          severity: critical
        - condition: "Business logic not separated from infrastructure"
          severity: major
        - condition: "Characterization test regression detected (new tests break existing)"
          severity: major
        - condition: "Extraction points plateau (delta < 3% between analysis passes)"
          severity: medium
    fallback:
      on_veto: "Re-analyze with broader seam detection strategy"
      on_timeout: "Proceed with partial extraction points, flag gaps"
      on_regression: "Rollback characterization tests to last green state, re-analyze"

  - id: phase_2_extraction
    name: "Business Rules Extraction"
    agent: harry-sneed
    depends_on: phase_1_analysis
    description: "Extract business rules from identified extraction points"
    inputs:
      - extraction_points
      - seam_map
      - characterization_tests
    input_validation:
      - field: extraction_points
        required: true
        min_items: 1
      - field: seam_map
        required: true
    actions:
      - "Restructure code for analysis (normalize control flow)"
      - "Slice programs by business variable"
      - "Multi-view analysis: data view, decision view, procedural flow"
      - "Cross-reference data definitions with procedural logic"
      - "Extract raw business rules with source traceability"
      - "Identify dead code and exclude from extraction"
    outputs:
      - raw_business_rules
      - source_traceability_map
      - dead_code_report
    checkpoint:
      type: human_review
      blocking: true
      question: "Review extracted rules sample (first 20). Are they accurate?"
      veto_conditions:
        - condition: "Less than 50% of expected rules extracted"
          severity: critical
        - condition: "No source traceability for extracted rules"
          severity: critical
        - condition: "Rules contain infrastructure logic (not business)"
          severity: major
        - condition: "Partial module failure (some modules unanalyzable)"
          severity: medium
        - condition: "Extraction plateau (new pass yields < 5% new rules)"
          severity: medium
    fallback:
      on_veto: "Re-extract with adjusted slicing parameters"
      on_timeout: "Export partial rules with traceability gaps flagged"
      on_partial_failure: "Document unanalyzable modules, proceed with extracted rules"

  - id: phase_3_formalization
    name: "Rules Formalization"
    agent: barbara-von-halle
    depends_on: phase_2_extraction
    description: "Formalize extracted rules into The Decision Model"
    inputs:
      - raw_business_rules
      - source_traceability_map
    input_validation:
      - field: raw_business_rules
        required: true
        min_items: 1
      - field: source_traceability_map
        required: true
    actions:
      - "Group rules by conclusion (rule families)"
      - "Create condition/conclusion tables"
      - "Apply 1st Normal Form (atomic conditions)"
      - "Apply 2nd Normal Form (no redundancy)"
      - "Apply 3rd Normal Form (no transitive deps)"
      - "Challenge each rule: is it still valid? Is it complete?"
    outputs:
      - decision_model
      - rule_families
      - normalization_report
    checkpoint:
      type: auto
      blocking: true
      checks:
        - "All rules assigned to a rule family"
        - "All tables pass 3NF validation"
        - "No orphan conditions"
      veto_conditions:
        - condition: "More than 20% of rules fail normalization"
          severity: critical
        - condition: "Rule families have overlapping conclusions"
          severity: critical
        - condition: "Normalization plateau (re-normalization yields same failures)"
          severity: medium
    fallback:
      on_veto: "Decompose overlapping families, re-normalize"
      on_timeout: "Flag non-normalized rules for manual review"
      on_plateau: "Accept current normalization level, document gaps for SME review"

  - id: phase_4_standardization
    name: "Vocabulary Standardization"
    agent: ronald-ross
    depends_on: phase_3_formalization
    description: "Standardize business vocabulary and rule language"
    inputs:
      - decision_model
      - rule_families
    input_validation:
      - field: decision_model
        required: true
      - field: rule_families
        required: true
        min_items: 1
    actions:
      - "Build business glossary (terms)"
      - "Define fact model (terms → facts → rules)"
      - "Rewrite rules in RuleSpeak format"
      - "Trace each rule to business motivation"
      - "Validate readability with non-technical stakeholders"
    outputs:
      - business_glossary
      - fact_model
      - rulespeak_rules
      - motivation_trace
    checkpoint:
      type: human_review
      blocking: true
      question: "Can business stakeholders read and understand the rules?"
      veto_conditions:
        - condition: "Business glossary has undefined terms"
          severity: critical
        - condition: "Rules not readable by non-technical stakeholders"
          severity: critical
        - condition: "Glossary term disambiguation needed (same term, multiple meanings across modules)"
          severity: major
    fallback:
      on_veto: "Simplify vocabulary, re-run readability check"
      on_timeout: "Export with glossary gaps documented"
      on_disambiguation: "Create context-qualified terms (e.g., 'customer [lending]' vs 'customer [billing]')"

  - id: phase_5_verification
    name: "Verification & Catalog"
    agents:
      - jan-vanthienen  # Decision table verification
      - james-taylor    # DMN export
    depends_on: phase_4_standardization
    description: "Verify decision tables and generate final rule catalog"
    inputs:
      - rulespeak_rules
      - decision_model
      - business_glossary
    input_validation:
      - field: rulespeak_rules
        required: true
        min_items: 1
      - field: decision_model
        required: true
      - field: business_glossary
        required: true
    actions:
      - "Check completeness of all decision tables"
      - "Check consistency (no contradictions)"
      - "Contract tables to minimum rows"
      - "Export to DMN format for portability"
      - "Generate rule catalog document"
      - "Create modernization assessment"
    outputs:
      - verified_decision_tables
      - dmn_export
      - rule_catalog
      - modernization_assessment
    checkpoint:
      type: quality_gate
      blocking: true
      gate: extraction-quality-gate.md
      veto_conditions:
        - condition: "Decision tables have contradictions"
          severity: critical
        - condition: "Completeness check fails for any table"
          severity: critical
        - condition: "Rule catalog missing traceability"
          severity: major
    fallback:
      on_veto: "Return contradictory tables to von-halle for re-normalization"
      on_timeout: "Export partial catalog with verification gaps flagged"

metrics:
  log_file: "metrics-log.json"
  per_phase:
    - timestamp_start
    - timestamp_end
    - rules_count
    - errors_count
    - retries_count
    - veto_conditions_triggered
  per_pipeline:
    - total_duration_minutes
    - total_rules_extracted
    - total_rules_formalized
    - false_positive_rate
    - sme_validation_rate

# Rule completeness validation
rule_validation:
  checklist: rule-completeness-checklist.md
  apply_at: phase_2_extraction
  mode: per_rule
  threshold: "90% pass (40/45 checkboxes)"
  on_fail: "Flag rule as INCOMPLETE, queue for re-work"

completion_criteria:
  - "All phases completed sequentially"
  - "All checkpoints passed (blocking)"
  - "Rule catalog generated in standard format"
  - "DMN export available"
  - "Source traceability maintained end-to-end"
  - "Business stakeholders validated readability"
  - "Zero critical veto conditions unresolved"
  - "Metrics log exported"
