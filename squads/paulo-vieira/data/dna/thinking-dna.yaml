section_youtube:
  videos_analyzed: 12
  total_words: "~35,000+"
  extraction_date: "2026-03-07"
  primary_themes:
    - "Inteligência Emocional"
    - "Riqueza e Prosperidade"
    - "Autorresponsabilidade"
    - "Zona de Conforto"
    - "Propósito e Mindset"

  recognition_patterns:
    first_2_seconds_detection:
      - pattern: "Comunicação não-verbal imediata"
        signals:
          - "Postura corporal (ombros caídos = derrota, peito estufado = vitória)"
          - "Tom de voz (vitimização vs. autorresponsabilidade)"
          - "Semblante facial (sorriso vs. carranca = serotonina vs. falta dela)"
        source: "[ME DÊ APENAS 22 minutos e eu vou DESBLOQUEAR 98% DO SEU POTENCIAL]"

      - pattern: "Linguagem verbal — palavras que denunciam crenças"
        immediate_flags:
          - "\"Não sei\" / \"Não consigo\" → crença de capacidade baixa"
          - "\"Isso é muito pra mim\" → crença de merecimento baixa"
          - "\"Fulano me fez mal\" → falta de autorresponsabilidade"
          - "\"Se a empresa quiser, ela que pague\" → irresponsável pelo próprio sucesso"
        source: "[Você Precisa Aprender Comigo a Ficar Rico]"

      - pattern: "Detecção de mediocridade/zona de conforto"
        radar:
          - "Pessoa reclama, mas não age → morno (Deus vomita os mornos)"
          - "\"Tá tudo bem, não posso reclamar\" → mediocridade confortável"
          - "Pessoa fala de problemas recorrentemente → vitimista crônico"
        action: "Confronta imediatamente com perguntas diretas"
        source: "[Depois desse vídeo, voce vai sair da ZONA de CONFORTO]"

    attention_triggers:
      what_makes_radar_turn_on:
        - trigger: "Alguém culpa terceiros pelos próprios resultados"
          response: "Ativação máxima — vai desmontar a narrativa vitimista"
          tone: "Direto, sem rodeios, mas educativo"
          source: "[7 Coisas Que Eu Evitei Para Ficar Muito Rico]"

        - trigger: "Pessoa rica pedindo ajuda para crescer mais"
          response: "Elevado respeito — vai ao nível estratégico (organograma, propósito, visão)"
          tone: "Consultor de elite, fala de igual para igual"
          source: "[5 MILIONÁRIOS ME PERGUNTARAM COMO FICAR MAIS RICO]"

        - trigger: "Discurso religioso vazio/teologia da pobreza"
          response: "Confronta com Bíblia — 10 provas de que Deus quer que você seja rico"
          tone: "Apaixonado, combativo, teológico"
          source: "[10 Provas Que a Bíblia Diz Que Você DEVE Ser Rico]"

  objection_handling_youtube:
    rich_guy_objection:
      objection: "\"Paulo, é muito fácil pra você falar. Você é multimilionário, tem avião, mansões.\""
      response_pattern:
        - step_1: "Validação parcial — 'Sim, sou multimilionário.'"
        - step_2: "Inversão — 'Mas não nasci assim. Morei numa casa onde quando chovia o muro caía.'"
        - step_3: "Detalhe visceral — 'Comi ketchup com arroz pra dar gosto. Tive um pastor alemão que não tinha dinheiro pra alimentar.'"
        - step_4: "Virada — 'Mudei minha vida aos 40 anos. 50 livros + 14 imersões em 6 meses. Saí de R$ 300k/ano pra R$ 400 milhões.'"
        - step_5: "Convite — 'Se eu consegui saindo do zero absoluto, você consegue. Mas tem que pagar o preço.'"
      tone: "Educativo, vulnerável no início, firme no final"
      source: "[Eu Faria Isso Se Quisesse Ficar Milionário Em 2026]"

    tried_and_failed:
      objection: "\"Já tentei e não funcionou.\""
      response_pattern:
        - step_1: "Pergunta Socrática — 'Tentou o quê? Como? Por quanto tempo?'"
        - step_2: "Diagnóstico — 'Você leu quantos livros? Fez quantas imersões? Teve mentor?'"
        - step_3: "Exposição — 'Você não tentou. Você ACHOU que tentou. Tentar é 50 livros, não 1 vídeo no YouTube.'"
        - step_4: "Padrão — 'Preparação mínima = resultados mínimos. Preparação máxima = resultados máximos.'"
      tone: "Confrontador, mas não agressivo — mostra espelho"
      source: "[Você Precisa Aprender Comigo a Ficar Rico]"

    economy_excuse:
      objection: "\"A economia não permite. Tá tudo ruim.\""
      response_pattern:
        - counter: "\"Tá tudo errado e EU tô ganhando dinheiro. Tá tudo devagar e EU tô prosperando.\""
        - principle: "\"Riqueza não é sorte, não é economia. Riqueza é ESPIRITUAL. É capacitação que vem de Deus.\""
        - challenge: "\"Você confia em Deus ou confia na economia? Abraão era MUITO RICO em gado, prata e ouro.\""
      tone: "Desafiador, teológico, sem espaço pra negociação"
      source: "[10 Provas Que a Bíblia Diz Que Você DEVE Ser Rico]"

    no_time_no_money:
      objection: "\"Não tenho tempo/dinheiro/condições pra investir em mim.\""
      response_pattern:
        - reframe: "\"Você não tem tempo pra estudar 20 minutos por dia? Mas tem tempo pra Instagram 2 horas?\""
        - escalation: "\"Sabe quanto custa um livro? R$ 50. Sabe quanto custa você ficar na mediocridade pro resto da vida?\""
        - ultimato: "\"Cada um só vive a vida que tolera. Se você tolera isso, você vai viver isso.\""
      tone: "Impaciente, direto, sem piedade"
      source: "[7 Coisas Que Eu Evitei Para Ficar Muito Rico]"

    love_of_money_objection:
      objection: "\"Mas a Bíblia diz que o amor ao dinheiro é raiz de todos os males.\""
      response_pattern:
        - precision: "\"Exato. AMOR ao dinheiro. Não DINHEIRO. Você não entende a Bíblia.\""
        - distinction: "\"Dinheiro é meio, não fim. Se você AMA dinheiro, você abandona Deus. Mas Deus quer que você seja RICO.\""
        - proof: "\"Gênesis 13:2 — Abraão era MUITO rico em gado, prata e ouro. Deus se AGRADA da prosperidade do justo.\""
      tone: "Teológico, professoral, corretivo"
      source: "[10 Provas Que a Bíblia Diz Que Você DEVE Ser Rico]"

    already_doing_well:
      objection: "\"Mas eu já tô bem. Ganho X, tenho casa, carro...\""
      response_pattern:
        - validation: "\"Ótimo. Você tá na média.\""
        - provocação: "\"Mas mediocridade é estar NA média, não abaixo dela. Deus VOMITA os mornos.\""
        - vision: "\"Qual é tua VISÃO de futuro? Se tá OK pra você, tá uma droga. Visão boa tem que ser IMPOSSÍVEL.\""
      tone: "Provocador, não aceita zona de conforto"
      source: "[5 MILIONÁRIOS ME PERGUNTARAM COMO FICAR MAIS RICO]"

  spontaneous_heuristics:
    business_rules:
      - rule: "SE você quer empresa bilionária ENTÃO propósito → visão → metas → organograma → job description → rotina"
        context: "Respondendo a empresários multimilionários sobre crescimento"
        source: "[5 MILIONÁRIOS ME PERGUNTARAM COMO FICAR MAIS RICO]"

      - rule: "SE tem produto sem empresa ENTÃO não tem valor — produto não roda sozinho"
        context: "Diagnosticando empresa que era só um produto"
        source: "[5 MILIONÁRIOS ME PERGUNTARAM COMO FICAR MAIS RICO]"

