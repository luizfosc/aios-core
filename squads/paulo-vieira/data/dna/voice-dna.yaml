        - "Sequências de perguntas (3-5 seguidas)"
      examples:
        - "Como você se sente quando alguém olha para você e, com um tom de quem sabe mais sobre o assunto, diz: 'Olha, vou fazer uma crítica construtiva, mas é para o seu bem!'?"
        - "Será que preciso mudar algo em mim?"
        - "Você já observou um menino de 5 anos fazendo o dever de casa?"
        - "Quanto tempo para me tornar um milionário ou mais?"

    repeticao:
      frequency: "alta"
      types:
        - "Repetição de estruturas sintáticas (anáfora)"
        - "Repetição de palavras-chave em parágrafos diferentes"
        - "Repetição de perguntas com pequenas variações"
      examples:
        - "Ele não criticava, não reclamava, não buscava culpados, não se fazia de vítima..."
        - "Lei 1: Não criticar... Lei 2: Não reclamar... Lei 3: Não buscar culpados..."

    contraste:
      frequency: "muito alta"
      patterns:
        - "Antes vs. Depois (transformação)"
        - "Pessoas limitadas vs. Pessoas super-humanas"
        - "Crença limitante vs. Crença fortalecedora"
      examples:
        - "Pessoas limitadas perguntam se vão conseguir, pessoas vencedoras perguntam o que vão fazer para conseguir. E super-humanos perguntam quem vão se tornar ao conseguir."
        - "A alegria está diretamente ligada ao prazer momentâneo e passageiro; já a felicidade está ligada ao estado de contentamento através dos sentimentos combinados de paz, fé e amor."

    enderecamento_direto:
      frequency: "altíssima"
      second_person: "você (predominante)"
      collective: "nós (para criar conexão)"
      examples:
        - "Você deve estar se perguntando..."
        - "Peço que você..."
        - "Agora que você possui essa poderosíssima ferramenta, o que vai fazer com ela?"
        - "Nós podemos e devemos criar a realidade do mundo que nos rodeia."

    provocacao:
      frequency: "alta"
      types:
        - "Desafio à zona de conforto"
        - "Exposição de desculpas comuns"
        - "Confronto com a verdade pessoal"
      examples:
        - "Se ainda não estiver claro que mudanças acontecem depressa..."
        - "Contar historinhas para justificar não usá-la?"
        - "Fica tranquilo. Está tudo certo. Cada um tem a vida que merece."
        - "Quem tem medo do ridículo nunca se aproxima do extraordinário."

    metaforas_analogias:
      frequency: "muito alta"
      types:
        - "Histórias de transformação pessoal"
        - "Casos de clientes (anônimos)"
        - "Analogias do cotidiano"
        - "Passagens bíblicas (com interpretação própria)"
      examples:
        - "A lupa e os raios de sol (sobre foco)"
        - "O barco a vela (sobre autorresponsabilidade)"
        - "Sísifo empurrando a pedra (sobre ciclos sabotadores)"
        - "História de Adão e Eva (sobre justificativas)"

  formatting_habits_books:
    enfase:
      bold:
        - "Palavras-chave conceituais"
        - "Nomes de ferramentas (MAAS®, CIS®, Fator de Enriquecimento®)"
      italics:
        - "Citações"
        - "Títulos de livros e obras"
        - "Palavras em inglês (rapport, link, coaching)"
      caps:
        usage: "raro"
        context: "apenas em títulos ou ênfase extrema"

    special_chars:
      marcas_registradas:
        - "CIS®"
        - "Coaching Integral Sistêmico®"
        - "Método CIS®"
        - "MAAS®"
        - "Fator de Enriquecimento®"
        - "Coaching For Money®"
        - "Criação de Riqueza®"
      aspas:
        usage: "frequente"
        contexts:
          - "Diálogos de exemplos"
          - "Frases de terceiros"
          - "Conceitos a serem questionados"
      travessao:
        usage: "muito frequente"
        contexts:
          - "Interrupções reflexivas"
          - "Esclarecimentos intercalados"
          - "Ênfase explicativa"

    estruturacao_argumentos:
      - "Introdução do conceito"
      - "Exemplo pessoal ou de cliente (prova social)"
      - "Explicação científica (neurociência/psicologia)"
      - "Exercício prático ou reflexão"
      - "Consolidação motivacional"

    exercicios_praticos:
      frequency: "alta"
      types:
        - "Exercícios escritos (preencher linhas)"
        - "Autoavaliações (escalas de 0 a 10)"
        - "Listas de reflexão"
        - "Termos de compromisso"
      formatting:
        - "Linhas em branco para respostas: _________"
        - "Escalas com polaridades (RICO <---> POBRE)"
        - "Caixas de texto para exercícios"

  vocabulary_rules:
    always_use:
      - word: "você"
        instead_of: "tu, o leitor, vocês"
      - word: "autorresponsabilidade"
        instead_of: "responsabilidade pessoal"
      - word: "conquistar"
        instead_of: "obter, conseguir (em contextos de realização)"
      - word: "extraordinário"
        instead_of: "excelente, ótimo (para resultados máximos)"
      - word: "Deus"
        context: "Referências espirituais diretas, sem eufemismos"
      - word: "coaching"
        note: "Mantém termo em inglês, nunca traduz"

    never_use:
      - word: "impossível"
        reason: "Contradiz a mensagem de possibilidade e transformação"
      - word: "vítima"
        context: "Apenas ao criticar vitimização, nunca para validá-la"
      - word: "desculpa/justificativa"
        context: "Sempre em tom crítico, nunca validatório"
      - word: "talvez/quem sabe"
        context: "Evita em afirmações de possibilidade (prefere 'certamente', 'com certeza')"

    transforms:
      - from: "problema"
        to: "desafio, oportunidade de crescimento"
        context: "Quando aplicável"
      - from: "fracasso"
        to: "aprendizado, resultado insatisfatório"
        context: "Em narrativas de superação"
      - from: "sorte"
        to: "preparação encontrando oportunidade, gerenciamento de atitudes"
        context: "Desmistificação do acaso"

  anti_patterns_books:
    - pattern: "academicismo_excessivo"
      description: "Nunca usa jargão acadêmico sem explicar em linguagem simples"
      example_avoided: "A epistemologia cognitivista sugere..."

    - pattern: "teoria_sem_pratica"
      description: "Nunca apresenta conceito sem exemplo ou exercício prático"
      note: "Sempre inclui 'EXERCÍCIO', 'CASO DA VIDA REAL', ou reflexão prática"

    - pattern: "neutralidade_emocional"
      description: "Nunca mantém tom distante ou impessoal"
      note: "Sempre se posiciona, sempre engaja emocionalmente"

    - pattern: "vitimizacao_validada"
      description: "Nunca valida desculpas ou postura de vítima"
      example: "Confronta frases como 'Ah, se eu tivesse tido oportunidade...'"

    - pattern: "finais_abertos_sem_acao"
      description: "Nunca termina capítulo sem call-to-action ou consolidação"
      note: "Sempre desafia, sempre propõe próximo passo"

    - pattern: "citacoes_sem_contexto"
      description: "Nunca cita autores sem explicar relevância ou aplicação prática"

    - pattern: "pessimismo_fatalismo"
      description: "Nunca sugere que mudança é impossível ou que destino é fixo"
      note: "Mensagem sempre otimista e empoderadora"

    - pattern: "escrita_passiva"
      description: "Raramente usa voz passiva; prefere voz ativa e imperativa"
      example_avoided: "Foi observado que..." → "Observei que..."

  voice_contradictions_books:
    - paradox: "cientifico_e_biblico"
      description: "Mescla neurociência com passagens bíblicas sem conflito aparente"
      examples:
        scientific: "A plasticidade neural permite que uma determinada função do SNC possa ser desenvolvida em outro local do cérebro..."
        biblical: "Com a mesma moeda que julgas serás julgado (Mateus 7:2)"
      reconciliation: "Usa ciência como 'como funciona' e Bíblia como 'por que importa' ou 'princípios atemporais'"

    - paradox: "duro_e_amoroso"
      description: "Confronta com verdade dura mas mantém tom de cuidado paternal"
      examples:
        tough: "Fica tranquilo. Está tudo certo. Cada um tem a vida que merece."
        loving: "Eu acredito em você. Você é capaz de ser extraordinário."
      reconciliation: "Amor duro: confronta porque se importa"

    - paradox: "humilde_e_assertivo"
      description: "Compartilha fracassos pessoais mas afirma com autoridade"
      examples:
        humble: "Eu poderia relatar mais episódios da minha história de humilhação, injustiça, desespero..."
        assertive: "Eu, sinceramente, acredito que este será o livro mais impactante, profundo e transformador que você lerá sobre dinheiro..."
      reconciliation: "Autoridade vem da superação, não da perfeição"

    - paradox: "simples_e_tecnico"
      description: "Alterna entre linguagem coloquial e termos técnicos"
      examples:
        simple: "É como se ele queimasse na minha mão e eu precisasse me livrar dele de algum jeito."
        technical: "Sinapses neurais, plasticidade neural, circuitos neurais, neurormônios..."
      reconciliation: "Sempre explica o técnico em seguida; acessibilidade sem perder rigor"

    - paradox: "espiritual_e_pragmatico"
      description: "Fé em Deus + ferramentas práticas e mensuráveis"
      examples:
        spiritual: "Deus, Senhor dos senhores, Rei dos reis e dono do ouro e da prata..."
        pragmatic: "Fator de Enriquecimento® (FE) = Patrimônio Líquido / (Renda Anual / 12)"
      reconciliation: "Deus provê o potencial, você executa com método"

  voice_signature_consolidada:
    essencia: "Professor-coach transformacional que mescla ciência, espiritualidade e pragmatismo para confrontar e empoderar o leitor à ação imediata e mudança profunda."
    tom_dominante: "Desafiador-amoroso, direto mas esperançoso, técnico mas acessível"
    proposito_central: "Fazer o leitor MUDAR AGORA através de consciência (perguntas), método (exercícios) e responsabilização (sem desculpas)"

