      - "sair da zona de conforto"
      - "colocar em prática"
      - "fazer acontecer"
      - "agir"
      - "mudar"
      - "focar"

    intensifiers:
      - "tremendamente"
      - "extremamente"
      - "completamente"
      - "absolutamente"
      - "necessariamente"
      - "profundamente"

    negations:
      - "NUNCA" (caps implícito pela ênfase)
      - "jamais"
      - "de jeito nenhum"

    inclusivity:
      - "nós" (frequente, cria aliança)
      - "amigo/amiga"
      - "meu amigo"
      - "vem comigo"

  structural_markers:
    module_intro:
      pattern: "Olá. Seja bem-vindo ao [número] módulo, [tema]"
      function: "Estrutura previsível, ritmo estabelecido"

    transitions:
      - "Vamos lá"
      - "Então"
      - "Agora"
      - "E aí"
      - "Continuando"

    recaps:
      pattern: "Nós já passamos por... agora vamos para..."
      function: "Reforço de progresso, momentum"

    meta_commentary:
      examples:
