section_livros:
  source: "5 livros prioritários"
  total_words: "~310,000"
  extraction_date: "2026-03-07"
  focus: "HOW he writes, not WHAT he teaches"

  writing_structure:
    paragraph_patterns:
      - type: "curtos_impactantes"
        description: "Parágrafos curtos de 1-3 linhas para enfatizar verdades"
        examples:
          - "A virada total começou quando aprendi que eu era o único responsável por toda aquela vida de miséria e que nada mudaria se eu não mudasse primeiro."
          - "E o melhor de tudo, minha relação com Deus está mais próxima e mais forte, hoje consigo chamá-lo de Pai – meu Pai."
          - "Você venceu! Aos 29 anos iniciei a minha caminhada para a vitória – caminhada essa que continuo e continuarei por toda a vida."

      - type: "narrativos_longos"
        description: "Parágrafos densos com histórias pessoais e exemplos reais"
        examples:
          - "Naquela idade, fui para o Nordeste, onde vivi todo tipo de adversidade durante treze anos seguidos. Porém, a dificuldade financeira era sempre a mais vistosa, a que mais machucava, a que causava os maiores e mais dolorosos estragos."

      - type: "listas_enumeradas"
        description: "Uso frequente de listas numeradas para estruturar conceitos"
        pattern: "1º passo... 2º passo... 3º passo..."
        examples:
          - "1º) Foco Visionário: saber com clareza quais são suas metas..."
          - "2º) Foco Comportamental: dedicar tempo e atenção..."
          - "3º) Foco Consistente: É a capacidade de manter em mente..."

    sentence_length:
      variation: "alta"
      patterns:
        - "Frases curtas e diretas para impacto (5-10 palavras)"
        - "Frases médias para explicação (15-25 palavras)"
        - "Frases longas e complexas para narrativas (30-50 palavras)"
      examples:
