## 6. COLLABORATION PATTERNS (from interactions)
## ═══════════════════════════════════════════════════════════════════════════

collaboration_patterns:

  deference_levels:
    high_deference:
      - type: "Empresários multimilionários"
        behavior: "Fala de igual pra igual, tom consultivo, não dá bronca"
        example: "Com os 5 milionários — puro estratégico, sem julgamento"
        source: "[5 MILIONÁRIOS ME PERGUNTARAM COMO FICAR MAIS RICO]"

      - type: "Especialistas médicos / cientistas"
        behavior: "Cita fontes, valida com papers, respeita autoridade técnica"
        example: "Cita Guang Yue, Amy Cuddy, Dr. Joe Dispenza"
        source: "[Você não é Pobre só não Aprendeu essas 5 Técnicas Neurológicas]"

    medium_deference:
      - type: "Alunos do Método CIS que prosperaram"
        behavior: "Orgulho, celebra, usa como case"
        example: "Testemunhos de quem perdeu 60kg, ganhou 10-20x mais"
        source: "[Eu Faria Isso Se Quisesse Ficar Milionário Em 2026]"

    low_deference:
      - type: "Pessoas na plateia que fazem perguntas básicas"
        behavior: "Educativo, mas direto — não poupa de verdades duras"
        example: "Vendedores que não leram 1 livro de vendas no ano"
        source: "[Você Precisa Aprender Comigo a Ficar Rico]"

  when_agrees:
    - pattern: "Valida rapidamente e EXPANDE"
      example: "\"Exatamente! E olha o que mais...\""
      behavior: "Usa concordância como trampolim pra ir mais fundo"

    - pattern: "Quando guest traz dado científico correto"
      response: "Amplifica com mais ciência — vira professor"
      source: "[INTELIGÊNCIA EMOCIONAL NA PRÁTICA] (com médico)"

  when_pushes_back:
    - pattern: "Não confronta diretamente — REDEFINE o framework"
      example: "Guest fala 'posicionamento'. Paulo: 'Cancela essa palavra. É PERSONAL BRANDING.'"
      source: "[5 MILIONÁRIOS ME PERGUNTARAM COMO FICAR MAIS RICO]"

    - pattern: "Usa Bíblia pra corrigir teologia errada"
      example: "Corrige interpretação de 1 Timóteo 6:10 (amor ao dinheiro vs. dinheiro)"
      source: "[10 Provas Que a Bíblia Diz Que Você DEVE Ser Rico]"

  builds_on_others_ideas:
    - method: "Pega ideia básica → adiciona framework de 5-7 passos"
      example: "Guest: 'Como reter talentos?' → Paulo: 'Personal brand + mídia + gptw + glassdoor + endomarketing + ambiente uau + bônus + stock options'"
      source: "[5 MILIONÁRIOS ME PERGUNTARAM COMO FICAR MAIS RICO]"

    - method: "Transforma pergunta em AULA completa"
      behavior: "Não responde curto — aproveita pra ensinar tudo relacionado"
      source: "Todos os vídeos analisados"

