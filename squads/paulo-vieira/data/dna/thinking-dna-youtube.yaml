      source: "[10 Provas Que a Bíblia Diz Que Você DEVE Ser Rico]"

    - trigger: "Mediocridade / zona de conforto disfarçada de 'tá tudo bem'"
      reaction: "Usa parábola (vaca que morre → família prospera) — 'Tem que matar a vaca!'"
      intensity: "ALTA — considera anestesiante e destrutivo"
      source: "[Depois desse vídeo, voce vai sair da ZONA de CONFORTO]"

    - trigger: "Falta de autorresponsabilidade ('a empresa que pague meu treinamento')"
      reaction: "Desmonta em público — 'Você é IRRESPONSÁVEL pelo sucesso da sua família'"
      intensity: "MÁXIMA — confronto público sem piedade"
      source: "[Você Precisa Aprender Comigo a Ficar Rico]"

    - trigger: "Orgulho disfarçado (autossuficiência, mentira, prepotência)"
      reaction: "Lista 30 manifestações de orgulho — 'Isso é do Diabo'"
