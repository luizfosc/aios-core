# ═══════════════════════════════════════════════════════════════════════════
# CONSOLIDATED FRAMEWORKS MAP
# ═══════════════════════════════════════════════════════════════════════════
frameworks:
  core_framework:
    name: "Método C.I.S (Coaching Integral Sistêmico)"
    description: "Framework principal de Paulo Vieira — coaching que integra razão + emoção de forma sistêmica"
    pillars: ["Coaching (onde está → onde quer)", "Integral (razão + emoção)", "Sistêmico (todos os pilares da vida)"]
    sources: [cis_2_0, livros]
    cross_source_count: 9

  primary_frameworks:
    - name: "6 Leis da Autorresponsabilidade"
      content:
        - "1. Se é pra criticar, SE CALE"
        - "2. Se é pra reclamar, DÊ SUGESTÃO"
        - "3. Se é pra buscar culpados, BUSQUE SOLUÇÃO"
        - "4. Se é pra se fazer de vítima, SEJA VENCEDOR"
        - "5. Se é pra justificar erros, APRENDA COM ELES"
        - "6. Se é pra julgar pessoas, JULGUE SUAS ATITUDES"
      sources: ["Poder da Ação", "Poder e Alta Performance", "Poder do Foco Mod 8", "CIS 2.0", "Criação de Riqueza", "Business HP", "12 Princípios"]
      ubiquity: "Presente em 7+ fontes — framework mais repetido"

    - name: "Matriz de Formação de Crenças"
      content: "COMUNICAÇÃO → PENSAMENTO → SENTIMENTO → CRENÇA → RESULTADO (auto-realizável)"
      sources: ["CIS 2.0 Mod 04", "Poder da Ação", "Poder e Alta Performance"]

    - name: "11 Pilares (MAS — Mapa de Autoavaliação Sistêmico)"
      content: ["Espiritual", "Parentes", "Conjugal", "Filhos", "Social", "Saúde", "Servir", "Intelectual", "Financeiro", "Profissional", "Emocional"]
      sources: ["Poder e Alta Performance", "Poder do Foco Mod 3", "Criação de Riqueza", "Fator de Enriquecimento"]

    - name: "Pirâmide Ser-Fazer-Ter"
      content: "Base: SER (identidade) → Meio: FAZER (habilidades) → Topo: TER (consequência)"
      sources: ["Poder do Foco Mod 3"]

    - name: "Princípio 10-90"
      content: "10% é o que acontece, 90% é o que você FAZ em relação ao que acontece"
      sources: ["Poder do Foco Mod 10"]

    - name: "Foco-Imersão-Agenda Programada"
      content: "Trilogia de mudança: FOCO (definir área) + IMERSÃO (14 livros, 25 vídeos) + AGENDA (execução seg-sex)"
      sources: ["Poder do Foco Mod 7", "CIS 2.0 Mod 05"]

  financial_frameworks:
    - name: "5 Condutas da Riqueza"
      sources: ["Criação de Riqueza", "Fator de Enriquecimento"]

    - name: "6 Armadilhas da Riqueza"
      sources: ["Criação de Riqueza", "Fator de Enriquecimento"]

    - name: "5 Princípios da Riqueza"
      sources: ["Criação de Riqueza"]

  tools:
    - name: "35 Perguntas Focais (Autocoaching)"
      source: "Poder do Foco Mod 5"

    - name: "PPS — Perguntas Poderosas de Sabedoria"
      sources: ["4 Atitudes", "12 Princípios", "Poder da Autorresponsabilidade", "Poder da Ação"]

    - name: "Exercício YES (Ancoragem Emocional)"
      source: "CIS 2.0 Mod 03-04"

    - name: "Mural da Vida Extraordinária"
      source: "Poder do Foco Mod 4"

    - name: "Agenda Comparada da Vida Extraordinária"
      source: "Poder do Foco Mod 7"

    - name: "200 Motivos de Gratidão"
      source: "Poder do Foco Mod 2"

