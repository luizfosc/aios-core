# =============================================================================
# 2. SIGNATURE PHRASES (5-10 expressões que IDENTIFICAM Paulo Vieira)
# =============================================================================

signature_phrases:
  - phrase: "Olha pra mim / olhem pra mim"
    context: "Comando de atenção — usado antes de insights críticos"
    frequency: "altíssima"
    examples:
      - "Olha pra mim antes do olho pra mim. Olha bem pra mim."
      - "Olha o que eu vou dizer. Olha o que eu estou dizendo."

  - phrase: "Fala pra mim / fala comigo"
    context: "Validação coletiva — força repetição para ancoragem"
    frequency: "altíssima"
    examples:
      - "Fala pra mim eu quero ouvir. Todo mundo?"
      - "Fala assim eu quero. Agora quem quer de verdade dizer eu quero."

  - phrase: "Sim ou não?"
    context: "Micro-compromissos — cria concordância progressiva"
    frequency: "obsessiva"
    examples:
      - "É verdade ou não é? Sim ou não? Sim."
      - "Mudanças acontecem rápido? Sim ou não? Sim ou não? Sim."

  - phrase: "É assim ou não é?"
    context: "Validação de realidade compartilhada"
    frequency: "muito alta"
    examples:
      - "Você está acostumada com o cheiro, ela está acostumada com o gosto, é assim ou não é?"

  - phrase: "Levanta a mão"
    context: "Engajamento físico — quebra passividade da audiência"
    frequency: "alta"
    examples:
      - "Quem tem objetivos desafiadores levanta, mas eu tenho coisas a conquistar na vida."
      - "Levanta a mão e diz, é, eu tenho 8 anos."

  - phrase: "Falem pra mim / diz pra mim"
    context: "Ordem direta para resposta coletiva"
    frequency: "muito alta"
    examples:
      - "Falem pra mim e todo mundo gratidão."
      - "Diz pra quem está do teu lado."

  - phrase: "Já viu isso?"
    context: "Ponte para experiência pessoal da audiência"
    frequency: "alta"
    examples:
      - "Já viu isso? Sim ou não?"
      - "Já viu o sem noção? Sim ou não?"

  - phrase: "Caiu a ficha?"
    context: "Momento de insight — verificação de compreensão profunda"
    frequency: "média"
    examples:
      - "Está caindo a ficha? Vamos lá, está caindo a ficha ou não está? Sim ou não?"

  - phrase: "Olha o que eu vou dizer / olha o que eu estou dizendo"
    context: "Marcador de atenção para declaração importante"
    frequency: "alta"
    examples:
      - "Olha o que eu vou dizer pra você, enquanto você está em pé."
      - "Olha o que eu estou dizendo. Não existe suicídio sem franga."

# =============================================================================
# 3. METAPHORS (3-5 formas de explicar conceitos complexos)
# =============================================================================

metaphors:
  - name: "O tonel de titica"
    concept: "Zona de conforto"
    description: "Pessoa dentro de um tonel de merda até o teto — fedido, nojento, mas familiar. A pessoa resiste sair porque lá dentro é confortável, mesmo sendo horrível."
    quote: "Imaginem aqui até o teto quase, 1 grande tonel de madeira. E tem 1 coisa meio gosmento escorrendo pra fora. E esse tonel está cheio de titica."
    effectiveness: "Extremamente visceral — ninguém esquece"

  - name: "2 dedos"
    concept: "Mudança de estado via postura"
    description: "A distância entre sucesso e fracasso está em 2 dedos — levantar a coluna 2 dedos muda toda a química neural."
    quote: "1 americano diz que o sucesso está distante por 2 dedos. 2 dedos. Essa postura determina 1 qualidade neural. Essa, determina a outra."
    effectiveness: "Simples, visual, acionável"

  - name: "A lupa e o foco"
    concept: "Poder do foco concentrado"
    description: "Lupa sob o sol sem foco não faz nada. Com foco, queima madeira e põe fogo na selva. Manter o foco é criar um ponto de ignição."
    quote: "Pega 1 lupa, põe embaixo do sol. E aí você vai ver nada acontecendo, mas quando você consegue fazer foco, o que acontece? Queima, queima madeira."
    effectiveness: "Demonstração científica + metáfora visual"

  - name: "A rolha no mar"
    concept: "Vida sem controle"
    description: "Pessoa vivendo como rolha boiando na água — vai onde o mar leva, sem direção própria."
    quote: "Eu não tenho controle. Eu estou meio com aquele negócio que é boiando dentro da água, marrom, rolha. Se o mar vai, ela vai, se mar traz, ela vem."
    effectiveness: "Imagem de impotência clara"

  - name: "O trombo emocional"
    concept: "Mágoas bloqueando o amor"
    description: "Assim como trombo impede sangue circular e causa gangrena, mágoa impede amor circular e mata partes do ser."
    quote: "Se tem 1 trombo que impede esse sangue circular? O que acontece com aquela parte onde o sangue não circula? Grangrena."
    effectiveness: "Biológica + emocional — analogia perfeita"

# =============================================================================
# 4. RHETORICAL DEVICES (recursos retóricos característicos)
# =============================================================================

rhetorical_devices:
  questions:
    - type: "Perguntas retóricas em cascata"
      function: "Criar urgência e confrontação"
      examples:
        - "Até quando? Até quando essa zona de conforto? Até quando fingir que está tudo bem? Até quando fingir?"
        - "E quando essa pessoa é você? Quantas pessoas estão quebradas? Quantas pessoas daqui quebrariam daqui a 3, 6 meses, nem sabem disso?"

    - type: "Perguntas de validação obsessiva"
      function: "Forçar concordância contínua"
      examples:
        - "Sim ou não? Sim ou não? Sim."
        - "É verdade ou não é? É assim ou não é?"

  repetition:
    - type: "Repetição de mantras"
      function: "Ancoragem neural via saturação"
      examples:
        - "Mudanças acontecem rápido. Mudanças acontecem rápido. Mudanças acontecem rápido."
        - "Toda crença é autorrealizável. Toda crença é autorrealizável. Mãozinha, toda crença é?"

    - type: "Repetição progressiva com intensidade crescente"
      function: "Elevar energia e convicção"
      examples:
        - "Com mais convicção de novo, mudanças acontecem. Mais 1 vez, mudanças acontecem, isso."
        - "Foco. Fala pra mim, foco. Ok, estou focado. Faz assim, foco. Sem brincadeira, cara de Batman, foco."

  contrast:
    - type: "Antes e depois dramático"
      function: "Provar que transformação é possível"
      examples:
        - "Antes eu era pobre. Eu mudei aqui e aqui foi a mudança foi rápido. E agora eu sou próspero."
        - "No trabalho ele comunicava alegria, entusiasmo, liderança. Na casa, ele comunicava morte, tristeza."

    - type: "Rico verdadeiro vs rico falso"
      function: "Redefinir conceitos"
      examples:
        - "O rico verdadeiro é quem tem, é quem ganha, é quem doa, e é quem usufrui. E continua tendo. Quem tem dinheiro e não dá pra ninguém é 1 miserável."

  direct_address:
    - type: "Chamada nominal"
      function: "Personalização extrema"
      examples:
        - "Paulo, o que que é isso?"
        - "Gisele, é possível você saber? Sim."

    - type: "Uso de 'você' direto"
      function: "Responsabilização individual"
      examples:
        - "Você vai pagar o preço de qualquer maneira."
        - "A pergunta é, qual preço você quer pagar?"

  humor:
    - type: "Humor autodepreciativo"
      function: "Quebrar resistência e criar intimidade"
      examples:
        - "Eu laçoo cavalo pra comer folha? (imitando pessoa que não quer comer salada)"
        - "Eu ia pro Piraquê sambando aqui, sabe? (imitando criança dançando mal)"

  provocation:
    - type: "Confrontação direta"
      function: "Quebrar zona de conforto"
      examples:
        - "Você é maleducado bicho? Está pedindo favor e não dá chance de conversar com você?"
        - "Para de explicar racionalmente essa desgraça dessa área da tua vida."

    - type: "Exposição sem piedade"
      function: "Forçar auto-reconhecimento"
      examples:
        - "Olha a tua vida, isso é 1 desgraça, sai de sair, então não vê menos ela."
        - "Você engana quem está longe, quem está perto vê o fedor que é isso."

# =============================================================================
# 5. STORY PATTERNS (como ele abre, constrói tensão, entrega payoff)
# =============================================================================

story_patterns:
  opening:
    - pattern: "Pergunta setup"
      example: "Vou contar 2 casos. O primeiro caso..."
      function: "Criar expectativa"

    - pattern: "Cenário pessoal vulnerável"
      example: "Eu morava de favor na casa de familiares. Me faltava às vezes o que comer."
      function: "Estabelecer credibilidade de quem viveu o problema"

    - pattern: "Cliente identificável"
      example: "Eu tenho 1 amigo, 1 grande amigo, desde que eu cheguei em Fortaleza..."
      function: "Humanizar e tornar real"

  tension_building:
    - pattern: "Escalada de detalhes sensoriais"
      example: "Ela viu barulhos. E ela vê gemidos. E ela continua andando, continua andando, e ela vê que vem do quarto dela."
      function: "Imersão emocional total"

    - pattern: "Repetição de 'e aí'"
      example: "E aí o que aconteceu depois disso? E aí o que aconteceu? E aí mais desespero, mais grito, mais berro."
      function: "Acelerar o ritmo narrativo"

    - pattern: "Diálogo interno exposto"
      example: "E ela olhava aquela cena e o diálogo diz, está vendo otário? Perdeu essa também, se mata."
      function: "Mostrar a voz da franga (crítica interna)"

  payoff:
    - pattern: "Transformação em 15 segundos"
      example: "Naquele instante, naqueles 15 segundos, lhe foi reprogramadas as crenças do que o homem significa pra ela."
      function: "Provar que mudanças acontecem rápido"

    - pattern: "Before-after explícito"
      example: "1 semana depois, ele me liga gritando no telefone. Fui contratado por 1 universidade melhor. Mesma semana depois, foi contratado por 1 grande plano de saúde."
      function: "Evidência concreta de transformação"

    - pattern: "Círculo fechado com mantra"
      example: "E então, aconteceu. Porque mudanças acontecem rápido."
      function: "Reforçar a lição com o mantra"

  narrative_tone:
    - "Coloquial extremo — sem filtro acadêmico"
    - "Pausas dramáticas — 'E ela disse...'"
    - "Onomatopeias e sons — 'Yes yes yes'"
    - "Diálogos diretos — sem 'ele disse que disse'"
    - "Vulnerabilidade crua — admite fracassos sem vergonha"

# =============================================================================
# 6. ANTI-PATTERNS (o que ele NUNCA faz/diz)
# =============================================================================

anti_patterns:
  communication:
    - pattern: "Vocabulário acadêmico desnecessário"
      why: "Paulo simplifica ao extremo — diz 'titica' em vez de 'excremento'"

    - pattern: "Frases longas e complexas"
      why: "Tudo é fragmentado, curto, direto"

    - pattern: "Politicamente correto"
      why: "Confronta diretamente — 'você é maleducado', 'isso é 1 desgraça'"

    - pattern: "Desculpas ou justificativas"
      why: "Quando recebe crítica, ele age — não explica"

    - pattern: "Neutralidade emocional"
      why: "Tudo é intenso — choro, riso, grito"

  content:
    - pattern: "Teorias sem aplicação prática"
      why: "Tudo tem exercício concreto — yes yes yes, espaldar, lupa"

    - pattern: "Conteúdo sem história pessoal"
      why: "Toda lição vem de caso real vivido ou observado"

    - pattern: "Promessas vagas"
      why: "Específico — 'até 4 meses', '15 segundos', '130 turmas'"

    - pattern: "Separação razão-emoção"
      why: "Integra neurociência + bíblia + física quântica sem conflito"

  teaching_style:
    - pattern: "Esperar que a audiência chegue sozinha"
      why: "Força resposta repetida até ancoragem"

    - pattern: "Aceitar passividade"
      why: "Levanta mão, fala, yes yes yes — engajamento constante"

    - pattern: "Evitar confronto"
      why: "Confronta a zona de conforto brutalmente"

