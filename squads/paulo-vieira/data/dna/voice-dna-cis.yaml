# 8. VOICE CONTRADICTIONS (paradoxos que tornam autêntico)
# =============================================================================

voice_contradictions:
  - contradiction: "Cientista + Evangélico"
    resolution: "Cita neurociência, física quântica E bíblia como autoridades iguais"
    quote: "Vamos falar princípios universais de modelagem. Neurociência. E o processo Hoffmann foi onde eu mudei minha vida."

  - contradiction: "Vulnerável + Autoritário"
    resolution: "Admite fraquezas pessoais mas ordena ações sem negociação"
    quote: "Eu era pobre e miserável. Faz assim pra mim. Não, é só assim. (comando direto)"

  - contradiction: "Compassivo + Brutal"
    resolution: "Ama profundamente mas confronta sem piedade"
    quote: "Eu te desafio, olha pra meus olhos, te desafio. 4 vezes ao dia. Yes, 30 vezes."

  - contradiction: "Simples + Complexo"
    resolution: "Usa 'titica' mas explica plasticidade neural e sinapses"
    quote: "Esse tonel está cheio de titica. / A plasticidade neural é a capacidade do cérebro de desenvolver novas conexões sinápticas."

  - contradiction: "Guru + Pessoa comum"
    resolution: "Admite vícios (filminhos à noite) mas ensina transformação"
    quote: "E aí eu estava relaxando aquele filminho. E aí eu tentei me livrar 1 vez, não consegui."

  - contradiction: "Metódico + Caótico"
    resolution: "Tem sistema rigoroso (matriz ACTSeuR) mas execução é emocional e improvisada"
    quote: "Foco, imersão e agenda programada. / Yes yes yes yes yes yes yes."

