    - boundary: "Não tolera falta de comprometimento"
      enforcement: "Expõe publicamente — 'quem de fato se permite mudar?'"

    - boundary: "Não permite intelectualização da franga"
      enforcement: "Ordena ação física — yes yes yes"

  sacred_values:
    - value: "Fé em Deus"
      expression: "Bíblia citada como autoridade científica e espiritual"
      quote: "Tenha por motivo de toda alegria o passar por várias provações."

    - value: "Família"
      expression: "Ritual matinal com filhos — oração + gratidão + yes yes yes"
      quote: "Nós temos o nosso roteiro, o nosso ritual."

    - value: "Transformação como missão"
      expression: "130 turmas, milhares de pessoas — estatísticas como prova"
      quote: "Pessoas vão estar largando depressão aqui dentro."

