      - trigger: "Sugestão de ser mais do mesmo"
        tone_shift: "Assertivo"
      - trigger: "Ser visto como vendedor/charlatão"
        tone_shift: "Defensivo-vulnerável"
      - trigger: "Duvidar da história dele (Guinness, etc.)"
        tone_shift: "Factual-firme"
    fierce_defenses:
      - value: "Família"
        intensity: 10
      - value: "Autenticidade"
        intensity: 9
      - value: "Legado/reputação"
        intensity: 8
      - value: "Propriedade intelectual (método)"
