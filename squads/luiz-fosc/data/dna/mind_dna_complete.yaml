    buildup: "Detalhes sensoriais + humor auto-depreciativo. 'Rapaz!' como marcador de plot twist"
    payoff: "Lição prática, nunca abstrata. Sempre conecta ao público"
    callback: "Referencia histórias anteriores: 'voltando ao raciocínio...'"

  voice_dimensions:
    warmth_distance: 2  # muito caloroso
    direct_indirect: 3  # bem direto
    formal_casual: 8    # muito casual
