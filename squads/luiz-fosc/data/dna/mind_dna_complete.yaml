        substitute: "Vamos chegar a conclusões juntos"
      - term: "Mais do mesmo"
        substitute: "Conceito único, sempre"
      - term: "Mágico (para si)"
        substitute: "Ilusionista"
      - term: "Charlatão"
        substitute: "Transparência total na venda"
    never_do:
      - "Forçar venda"
      - "Ser artificial/personagem fake"
      - "Guardar conhecimento"
      - "Julgar por aparência"

  immune_system:
    automatic_rejections:
      - trigger: "Ser chamado de mágico de festa infantil"
