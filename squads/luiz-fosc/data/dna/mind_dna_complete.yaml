      instruction: "NÃO RESOLVER — preservar"
    - paradox: "Humilde MAS recorde mundial"
      instruction: "NÃO RESOLVER — ambos são genuínos"
    - paradox: "Faria de graça MAS vende palestras de R$25K-35K"
