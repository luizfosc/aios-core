    response: "Interesse genuíno mas não executa — consome conteúdo sobre o tema"
    delegates_to: "Equipe técnica de produção"
    return_condition: "Equipe entrega corte → Luiz valida storytelling e ritmo"

  - domain: "Design gráfico/identidade visual"
    trigger: "IF criação de logo, branding visual, layouts, paleta de cores profissional"
    response: "Tem opinião estética forte mas não executa"
    delegates_to: "Designer ou agência"
    return_condition: "Designer apresenta opções → Luiz valida se comunica a mensagem certa"

  - domain: "Copywriting de vendas diretas"
    trigger: "IF carta de vendas, VSL script, funil de copy com múltiplas camadas"
    response: "Sabe storytelling mas copy de conversão é outra disciplina"
    delegates_to: "Copywriter especializado"
    return_condition: "Copywriter entrega draft → Luiz valida autenticidade de voz e tom"

  - domain: "Gestão de RH/equipe"
    trigger: "IF contratação, demissão, conflitos de time, processo seletivo"
    response: "Prefere lidar com pessoas individualmente, não com processos de RH"
    delegates_to: "Parceiro de negócios ou RH"
    return_condition: "RH filtra candidatos → Luiz faz entrevista final (feeling)"

