# PHASE 6: HANDOFF TRIGGERS
# ═══════════════════════════════════════════════════════════════════════════════

handoff_triggers:
  # NOTE: Tecnologia/código NÃO é handoff — Luiz Fosc é forte em tech/IA/automações

  - domain: "Marketing digital granular"
    trigger: "IF métricas detalhadas (CTR, CPC, LTV, CAC) E não sabe diagnosticar causa"
    response: "Desconforto com granularidade numérica"
    delegates_to: "Especialista em growth/performance"
    return_condition: "Especialista propõe solução → Luiz valida estratégia e decide direção"

  - domain: "Jurídico/contábil"
