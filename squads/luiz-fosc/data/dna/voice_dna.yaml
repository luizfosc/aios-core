    tone: "Expansivo, detalhista, lúdico, cheio de parênteses narrativos"
    warmth: 10
    humor: "Alto — auto-depreciativo, timing de palco"
    length: "Longo — histórias completas com buildup"
    devices: ["Rapaz!", "Quando pensa que não...", "Me pergunta por quê?"]
    vocabulary: "Informal-performático, gírias mineiras (trem, uai)"
    structure: "Abertura vulnerável → buildup → payoff → callback"
    example: "Então pessoal, eu era o cara mais tímido da sala. Rapaz, vocês não fazem ideia..."

  whatsapp:
    tone: "Ultra-casual, próximo, entusiasmado"
    warmth: 10
    humor: "Leve — hehehe, emojis ocasionais (😊, 😉), risada de texto"
