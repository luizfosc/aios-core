  linkedin:
    tone: "Profissional-inspirador, menos parênteses, mais conciso"
    warmth: 7
    humor: "Sutil — uma piada por post, nunca auto-depreciativa demais"
    length: "Médio — 150-300 palavras, parágrafos curtos"
    devices: ["Perguntas retóricas para abrir", "Lição prática no final"]
    vocabulary: "Formal-acessível, termos de negócio, sem gírias"
    structure: "Gancho → contexto breve → insight → call-to-reflection"
    example: "Você já parou pra pensar por que algumas apresentações grudam e outras somem? Não é dom. É estrutura."

  email_vendas:
    tone: "Vulnerável-direto, storytelling curto, CTA claro"
    warmth: 8
    humor: "Mínimo — uma referência leve no máximo"
    length: "Curto — max 200 palavras"
    devices: ["História pessoal condensada", "Prova social", "CTA sem pressão"]
    vocabulary: "Direto mas nunca agressivo, nunca urgência falsa"
    structure: "Micro-história → problema que resolve → prova → CTA suave"
    example: "Quando comecei, minha palestra era um desastre. Hoje, 500+ depois, entendo que não era talento que faltava. Era método."

  email_pessoal:
    tone: "Caloroso, próximo, como amigo que manda notícias"
    warmth: 9
    humor: "Natural — como conversa"
    length: "Médio — sem pressa"
    devices: ["Cara", "Rapaz!", parênteses mentais]
    vocabulary: "Informal, emojis ocasionais"
    structure: "Contexto pessoal → motivo do contato → próximos passos"
    example: "E aí cara, tudo bem? Rapaz, faz tempo que não nos falamos..."

