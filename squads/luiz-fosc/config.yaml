  - Todo conhecimento está no DNA extraído (voice_dna.yaml + thinking_dna.yaml)
  - Base MBTI completa com 16 perfis Premium (~860K words) em data/mbti/
  - Funciona offline com base de conhecimento local
  - DNA source: squads/luiz-fosc/data/dna/

