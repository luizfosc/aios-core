# Workflow: Batch Conversion Pipeline
# Converts all files in a directory to markdown

workflow:
  id: wf-convert-batch
  name: "Batch Conversion Pipeline"
  trigger: "*batch {directory}"
  executor: etl-chief

  phases:
  pre_flight:
    description: "Verify dependencies ONCE before batch processing"
    checks:
      - name: "Python 3 available"
        command: "python3 --version"
        on_fail: "ERROR: Python 3 not found. Install via: brew install python@3.13"
      - name: "Tesseract available (for images)"
        command: "tesseract --version"
        on_fail: "WARN: Tesseract not installed. Image OCR will be skipped."
        required: false
      - name: "Polars installed"
        command: "python3 -c 'import polars'"
        on_fail: "WARN: polars not installed. Spreadsheet conversion unavailable."
        required: false
      - name: "python-pptx installed"
        command: "python3 -c 'import pptx'"
        on_fail: "WARN: python-pptx not installed. Presentation conversion unavailable."
        required: false
      - name: "media-processor squad"
        check: "file_exists: squads/media-processor/config.yaml"
        on_fail: "WARN: media-processor not installed. Video/audio delegation unavailable."
        required: false
      - name: "book-to-markdown skill"
        check: "file_exists: .aios/skills/book-to-markdown/convert.py"
        on_fail: "WARN: book-to-markdown not installed. PDF/EPUB delegation unavailable."
        required: false
    behavior: |
      - Required checks that fail → ABORT with clear error BEFORE scanning
      - Optional checks that fail → WARN and disable affected processors for entire batch
      - Cache results for session (don't re-check per file)
      - Run ONCE at batch start, not per file

  phases:
    - phase: 1
      name: "Scan Directory"
      action: |
        1. List all files in {directory}
        2. If --recursive: include subdirectories
        3. Filter out:
           - Hidden files (.*)
           - Already converted (.md files that have source_path frontmatter)
           - Files matching skip patterns (.DS_Store, Thumbs.db, etc.)
        4. Sort by type for efficient batch processing
      output: "file_list with classifications"

    - phase: 2
      name: "Classify All"
      task: classify-file
      mode: "batch"
      action: |
        For each file in file_list:
        1. Run classify-file
        2. Group by processor type
        3. Identify vetoed files
      output: |
        {
          "total": N,
          "by_type": {
            "spreadsheet": [files],
            "presentation": [files],
            "image": [files],
            "book": [files],
            "video": [files],
            "data": [files],
            "text": [files]
          },
          "vetoed": [files with reasons],
          "to_process": N
        }

    - phase: 3
      name: "Display Plan"
      action: |
        Show user what will be processed:
        ```
        Scanning: {directory}
        Found {total} files:
          - {N}x {type} → {processor}
          - ...
          Skipped: {vetoed_count} ({reasons})

        Proceed? (Y/n)
        ```
      checkpoint:
        condition: "User confirms or auto-proceed if < 20 files"

    - phase: 4
      name: "Process All"
      concurrency:
        strategy: "grouped-sequential"
        description: |
          Process files grouped by type for efficiency.
          Within each type group: sequential (shared resources like OCR engine).
          Between independent type groups: can parallelize if resources allow.
        groups:
          - name: "delegated"
            types: [video, audio, book, document]
            max_concurrent: 1    # External processors handle their own concurrency
          - name: "spreadsheets"
            types: [spreadsheet]
            max_concurrent: 3    # Polars is thread-safe
          - name: "presentations"
            types: [presentation]
            max_concurrent: 2    # python-pptx is lightweight
          - name: "images"
            types: [image]
            max_concurrent: 1    # Tesseract is CPU-intensive
          - name: "data-text"
            types: [data, text]
            max_concurrent: 5    # Lightweight parsing
        resource_limits:
          max_memory_mb: 2048    # Abort if memory exceeds 2GB
          max_cpu_percent: 80    # Throttle if CPU > 80%
      action: |
        For each file (grouped by type for efficiency):
        1. Run wf-convert-single per concurrency strategy
        2. Track progress: [========>    ] {done}/{total}
        3. On error: log, save state, continue with next file
        4. Update running stats (converted, failed, skipped)
        5. Save batch state after each file completes

    - phase: 5
      name: "Quality Gate"
      task: validate-output
      mode: "batch-summary"
      checks:
        - "All expected outputs exist"
        - "No empty outputs"
        - "Frontmatter consistent across batch"

    - phase: 6
      name: "Quality Verification"
      task: verify-extraction-quality
      mode: "batch"
      condition: "--no-qa flag NOT present"
      on_skip:
        description: "MANDATORY: Log QA bypass for ALL files in batch"
        action: |
          For each converted file, update frontmatter with:
            qa_skipped: true
            qa_skipped_at: "{ISO timestamp}"
            qa_skipped_by: "user (--no-qa flag)"
          Log: "WARNING: QA verification skipped for {total} files at {timestamp}"
      action: |
        For each successfully converted file:
        1. Run verify-extraction-quality (source vs output comparison)
        2. Score each file on 5 dimensions (0-10)
        3. Auto-retry CONDITIONAL files (max 2 retries)
        4. Queue NEEDS_REVIEW and FAIL files for human review
        5. Track scores for batch summary

        Progress display:
        ```
        Verifying quality... [=========>     ] {done}/{total}
        Current: {filename} — Score: {score}/10
        ```

    - phase: 7
      name: "Human Review Queue"
      task: human-review-extraction
      condition: "Files with NEEDS_REVIEW or FAIL status exist"
      action: |
        Present review queue to user:
        ```
        ⚠️  {N} documents need human review:
          1. {file1} — Score: {score}/10 — {main_issue}
          2. {file2} — Score: {score}/10 — {main_issue}

        ? Start human review now?
          1. Yes, review all
          2. Yes, review critical only (score < 5.0)
          3. No, save queue for later (*review --batch {directory})
        ```

        If user chooses to review:
          → Run human-review-extraction in batch mode

    - phase: 8
      name: "Summary Report"
      action: |
        Display final summary:
        ```
        Batch complete:
          Converted: {N}/{total}
          Skipped: {N} (existing/vetoed)
          Failed: {N}

        Quality Summary:
          Average score: {avg_score}/10
          ✅ PASS:          {N} (avg {X}/10)
          ✅ APPROVED:      {N} (human reviewed)
          🔄 RE-EXTRACTED:  {N} (avg improvement +{X})
          ⚠️  PENDING:      {N} (awaiting review)
          ❌ REJECTED:      {N}

        Output: {N} .md files saved next to originals
        Reports: {directory}/.qa/

        Failures (if any):
          - {file}: {reason}
        ```

  state_persistence:
    description: "Save batch state for resume on interruption"
    state_file: "{directory}/.etl-batch-state.json"
    save_interval: "After each file completes"
    state_schema: |
      {
        "state_version": 1,
        "batch_id": "uuid",
        "directory": "/path/to/dir",
        "started_at": "ISO timestamp",
        "updated_at": "ISO timestamp",
        "total_files": N,
        "processed": ["file1.xlsx", "file2.pdf"],
        "skipped": [{"file": "encrypted.pdf", "reason": "VETO_ENCRYPTED"}],
        "failed": [{"file": "corrupt.csv", "error": "parse error details"}],
        "pending": ["remaining1.pptx", "remaining2.png"],
        "status": "in_progress|completed|interrupted"
      }
    resume_command: "*batch {directory} --resume"
    resume_behavior: |
      1. Check for .etl-batch-state.json in directory
      2. Verify state_version matches current version (v1). If mismatch: WARN and suggest --force
      3. If found and status=interrupted or in_progress:
         - Load state
         - Skip already processed/skipped files
         - Resume from first pending file
         - Display: "Resuming batch: {processed}/{total} already done"
      3. If found and status=completed:
         - Display: "Batch already completed. Use --force to re-run."
    cleanup: |
      - On successful completion: delete .etl-batch-state.json
      - On --force: delete state file and start fresh
      - State file is gitignored pattern: .etl-batch-state.json

  error_handling:
    per_file: "Log error, save state, continue with next file"
    on_all_fail: "Report critical failure, save final state"
    on_partial: "Report summary with failure list, save state"
    on_interrupt: "Save current state immediately, report resume command"
