# Workflow: Single File Conversion
# Converts one file to normalized markdown

workflow:
  id: wf-convert-single
  name: "Single File Conversion"
  trigger: "*convert {path}"
  executor: etl-chief

  pre_flight:
    description: "Verify dependencies before processing"
    checks:
      - name: "Python 3 available"
        command: "python3 --version"
        on_fail: "ERROR: Python 3 not found. Install via: brew install python@3.13"
      - name: "Tesseract available (for images)"
        command: "tesseract --version"
        on_fail: "WARN: Tesseract not installed. Image OCR will be skipped. Install via: brew install tesseract tesseract-lang"
        required: false  # Only required for image processing
      - name: "Polars installed"
        command: "python3 -c 'import polars'"
        on_fail: "WARN: polars not installed. Spreadsheet conversion unavailable. Run: pip3 install polars"
        required: false
      - name: "python-pptx installed"
        command: "python3 -c 'import pptx'"
        on_fail: "WARN: python-pptx not installed. Presentation conversion unavailable. Run: pip3 install python-pptx"
        required: false
      - name: "media-processor squad"
        check: "file_exists: squads/media-processor/config.yaml"
        on_fail: "WARN: media-processor not installed. Video/audio delegation unavailable."
        required: false
      - name: "book-to-markdown skill"
        check: "file_exists: .aios/skills/book-to-markdown/convert.py"
        on_fail: "WARN: book-to-markdown not installed. PDF/EPUB delegation unavailable."
        required: false
    behavior: |
      - Required checks that fail → ABORT with clear error
      - Optional checks that fail → WARN and disable affected processors
      - Cache results for session (don't re-check per file in batch)

  phases:
    - phase: 1
      name: "Classify"
      task: classify-file
      input:
        file_path: "{path}"
      checkpoint:
        condition: "classification.veto == null"
        on_fail: "Report veto reason and stop"

    - phase: 2
      name: "Extract & Convert"
      task: "{classification.processor}"
      input:
        file_path: "{path}"
      routing:
        delegate_true:
          description: "Call external processor"
          video_audio: "Delegate to media-processor"
          book_document: "Delegate to book-to-markdown skill"
        delegate_false:
          description: "Execute internal task"
          spreadsheet: "convert-spreadsheet"
          presentation: "convert-presentation"
          image: "convert-image-ocr"
          data: "convert-data-file"
          text: "convert-text"

    - phase: 3
      name: "Normalize"
      task: normalize-output
      input:
        raw_content: "{phase_2.output}"
        classification: "{phase_1.output}"
      checkpoint:
        condition: "frontmatter valid AND content non-empty"
        on_fail: "Report normalization error"

    - phase: 4
      name: "Validate & Save"
      task: validate-output
      input:
        content: "{phase_3.output}"
        output_path: "{same_dir}/{filename}.md"
      checkpoint:
        condition: "status == PASS"
        on_fail: "Report validation failure, do NOT save"

    - phase: 5
      name: "Quality Verification"
      task: verify-extraction-quality
      condition: "--no-qa flag NOT present"
      on_skip:
        description: "MANDATORY: Log QA bypass in frontmatter when --no-qa is used"
        action: |
          Update output .md frontmatter with:
            qa_skipped: true
            qa_skipped_at: "{ISO timestamp}"
            qa_skipped_by: "user (--no-qa flag)"
          Log: "WARNING: QA verification skipped for {filename} at {timestamp}"
          This ensures traceability — no silent bypasses allowed.
      input:
        source_path: "{path}"
        output_path: "{same_dir}/{filename}.md"
        classification: "{phase_1.output}"
      checkpoint:
        condition: "qa_status in [PASS, CONDITIONAL]"
        on_pass: "Continue to Report phase"
        on_conditional: |
          Auto-retry extraction with adjusted parameters.
          Max retries: 2. If still below threshold → queue for human review.
        on_fail: |
          Queue for human review (human-review-extraction task).
          Continue to Report phase with NEEDS_REVIEW status.

    - phase: 6
      name: "Report"
      action: |
        Display summary:
        - Input: {filename}.{ext}
        - Type: {source_type}
        - Output: {output_path}
        - Word count: {word_count}
        - Language: {language}
        - QA Score: {qa_score}/10
        - QA Status: {qa_status}
        - Status: {final_status}
      routing:
        purpose_driven:
          condition: "--purpose or --interactive flag present"
          action: "Return output_path to wf-purpose-driven Phase 2 instead of terminating"
          note: "When called as Phase 1 of wf-purpose-driven, this report is intermediate, not final"
        needs_review:
          condition: "qa_status == NEEDS_REVIEW or qa_status == FAIL"
          action: "Suggest: *review {output_path} for human quality review"

  error_handling:
    on_veto: "Report reason, skip file"
    on_error: "Report error with details, do not save partial output"
    on_delegate_fail: "Report which processor failed and why"
