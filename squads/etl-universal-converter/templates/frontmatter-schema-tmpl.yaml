# Frontmatter Schema Template
# Standard YAML frontmatter for all ETL Universal Converter outputs
#
# Usage: Copy required fields, add optional fields as needed

# ═══════════════════════════════════════════════════════════════
# REQUIRED FIELDS (must be in every output)
# ═══════════════════════════════════════════════════════════════

required:
  title: "{{TITLE}}"                    # Derived from filename or document metadata
  source_type: "{{SOURCE_TYPE}}"        # video | audio | book | document | spreadsheet | presentation | image | data | text
  source_format: "{{SOURCE_FORMAT}}"    # Original extension without dot (pdf, xlsx, mp4, etc.)
  source_path: "{{SOURCE_PATH}}"        # Absolute path to original file
  date_processed: "{{DATE}}"            # ISO date: YYYY-MM-DD
  word_count: "{{WORD_COUNT}}"          # Integer: total words in content body

# ═══════════════════════════════════════════════════════════════
# OPTIONAL FIELDS (add when available)
# ═══════════════════════════════════════════════════════════════

optional:
  author: "{{AUTHOR}}"                  # If extractable from metadata
  language: "{{LANGUAGE}}"              # Auto-detected: pt-BR, en-US, es-ES
  tags: ["{{TAG1}}", "{{TAG2}}"]        # Auto-generated topic tags (3-5)
  toc: true                             # true if document has 3+ headers

  # Format-specific
  pages: "{{PAGES}}"                    # Books/PDFs: page count
  sheets: ["{{SHEET1}}", "{{SHEET2}}"]  # Spreadsheets: list of sheet names
  total_rows: "{{ROWS}}"               # Spreadsheets: total data rows
  slides: "{{SLIDES}}"                 # Presentations: slide count
  duration: "{{DURATION}}"             # Video/Audio: HH:MM:SS
  ocr_confidence: "{{CONFIDENCE}}"     # Images: 0-100%
  ocr_language: "{{OCR_LANG}}"         # Images: Tesseract language used

# ═══════════════════════════════════════════════════════════════
# EXAMPLE: Spreadsheet
# ═══════════════════════════════════════════════════════════════

example_spreadsheet: |
  ---
  title: "Relatório Financeiro Q4 2025"
  source_type: spreadsheet
  source_format: xlsx
  source_path: "<USER_HOME>/docs/relatorio-q4.xlsx"
  date_processed: "2026-03-04"
  word_count: 3420
  language: "pt-BR"
  sheets: ["Resumo", "Detalhamento", "Gráficos"]
  total_rows: 847
  tags: [financeiro, relatório, trimestral]
  ---

# ═══════════════════════════════════════════════════════════════
# EXAMPLE: Image OCR
# ═══════════════════════════════════════════════════════════════

example_image: |
  ---
  title: "Documento Escaneado"
  source_type: image
  source_format: png
  source_path: "<USER_HOME>/scans/contrato.png"
  date_processed: "2026-03-04"
  word_count: 342
  language: "pt-BR"
  ocr_confidence: 87
  ocr_language: "por+eng"
  tags: [contrato, jurídico]
  ---
