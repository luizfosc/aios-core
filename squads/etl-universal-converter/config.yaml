# ETL Universal Converter Squad Configuration
# Version: 1.0.0
# Created: 2026-03-04

pack:
  name: etl-universal-converter
  title: "ETL Universal Converter — Any File → Treated Markdown"
  version: "1.1.0"
  author: luiz-fosc
  description: >
    Content ETL pipeline that converts ANY file format into treated, normalized
    markdown with standardized frontmatter. Routes to specialized processors
    (media-processor for video/audio, book-to-markdown for books) and handles
    spreadsheets, presentations, images with OCR, and data files internally.
    Supports single file and batch processing with quality validation.
  slash_prefix: etl
  pattern_prefix: ETL
  category: content-processing
  icon: null
  type: orchestrator
  entry_agent: etl-chief

tags:
  - etl
  - content-processing
  - file-conversion
  - markdown
  - ocr
  - spreadsheet
  - presentation
  - universal-converter
  - batch-processing

settings:
  output:
    location: same_directory  # Save .md next to original file
    suffix: ""                # filename.pdf → filename.md
    overwrite: false          # Require --overwrite flag
  batch:
    skip_existing: true       # Skip if .md already exists
    max_concurrent: 5         # Parallel file processing
  timeout:
    per_file: 300             # 5 minutes per file (internal processors)
    ocr: 120                  # 2 minutes for OCR
    delegation:
      media_processor: 600    # 10 min for video/audio
      book_to_markdown: 300   # 5 min for books
  concurrency:
    batch_max_concurrent: 5       # Max parallel files in batch
    ocr_max_concurrent: 1         # Tesseract is CPU-intensive
    spreadsheet_max_concurrent: 3 # Polars is thread-safe
    delegation_max_concurrent: 1  # External processors handle own concurrency
  resume:
    enabled: true
    state_file: ".etl-batch-state.json"  # Saved in batch directory
  language:
    default: "pt-BR"
    detect: true              # Auto-detect with langdetect
  quality_verification:
    enabled: true                    # Set false to disable QA pipeline
    threshold: 7.0                   # Minimum score to PASS (0-10)
    max_retries: 2                   # Auto-retry CONDITIONAL scores
    always_compare_source: true      # Always compare with original file
    qa_directory: ".qa"              # Reports saved here
    auto_review: false               # Auto-queue human review for failures
    report_format: "markdown"        # Report output format
    history_enabled: true            # Track review history
    feedback_loop_interval: 10       # Analyze patterns every N reviews
    feedback_loop_trigger: automatic  # auto-trigger after N reviews
    queue_max_age_days: 7             # Auto-expire unreviewed items after 7 days
    queue_expire_action: auto_reject  # auto_reject | escalate | warn_only
    max_total_re_extractions: 5       # Global cap across all review sessions
    log_qa_bypass: true               # MANDATORY: log when --no-qa is used
  purpose_driven:
    relevance_threshold: 0.4      # Default minimum score to include section
    min_coverage: 0.30            # Never exclude > 70% without auto-adjust
    max_coverage: 0.95            # Warn if almost everything passes
    curated_suffix: ".curated"    # filename.curated.md
    delegation_timeout: 300       # 5 min per delegation step
    max_delegation_retries: 1     # Retry once on failure

activation:
  slash_command: etl
  aliases:
    - etl-universal-converter
    - etl-converter
    - converter
  example_activation: "@etl-chief"

agents:
  orchestrator:
    - etl-chief

workflows:
  - id: wf-convert-single
    name: "Single File Conversion"
    phases: 6
    quality_gates: 2
    duration: "10s - 10min"

  - id: wf-convert-batch
    name: "Batch Conversion Pipeline"
    phases: 8
    quality_gates: 3
    duration: "1min - 2h"

  - id: wf-quality-review
    name: "Quality Review Pipeline"
    phases: 5
    quality_gates: 1
    duration: "30s - 1h"
    trigger: "*verify, *review, *qa-batch"

  - id: wf-purpose-driven
    name: "Purpose-Driven Conversion Pipeline"
    phases: 8
    quality_gates: 1
    duration: "1min - 30min"
    trigger: "--purpose or --interactive flags"

tasks:
  - classify-file
  - convert-spreadsheet
  - convert-presentation
  - convert-image-ocr
  - convert-data-file
  - convert-text
  - normalize-output
  - enrich-metadata
  - validate-output
  # Quality verification tasks
  - verify-extraction-quality
  - human-review-extraction
  # Purpose-driven tasks
  - analyze-structure
  - curate-by-purpose
  - delegate-extraction

quality_gates:
  - id: QG-ETL-001
    name: Output Validation
    type: blocking
    checks:
      - "Output .md file exists and is non-empty"
      - "Frontmatter YAML is valid and complete"
      - "Content word count > 0"
      - "UTF-8 encoding confirmed"
      - "Headers are properly formatted (# ## ###)"

  - id: QG-ETL-002
    name: Batch Completion
    type: reporting
    checks:
      - "All files processed or explicitly skipped"
      - "No critical failures unresolved"
      - "Summary report generated"

  - id: QG-ETL-003
    name: Extraction Quality
    type: blocking
    checks:
      - "Source vs output comparison completed"
      - "Quality score >= threshold (default 7.0)"
      - "All 5 dimensions scored (fidelity, completeness, structure, metadata, readability)"
      - "Quality report generated and saved"
      - "Frontmatter updated with qa_ fields"

  - id: QG-ETL-004
    name: Human Review
    type: reporting
    checks:
      - "All NEEDS_REVIEW files reviewed or queued"
      - "Review decisions logged in history"
      - "Rejected files moved to .qa/rejected/"
      - "Batch summary generated"

# File type routing matrix
routing:
  # Delegated to existing squads
  video:
    extensions: [".mp4", ".mkv", ".webm", ".avi", ".mov"]
    processor: media-processor
    delegate: true

  audio:
    extensions: [".mp3", ".m4a", ".wav", ".flac", ".ogg", ".aac"]
    processor: media-processor
    delegate: true

  book:
    extensions: [".pdf", ".epub", ".mobi", ".azw", ".azw3"]
    processor: book-to-markdown
    delegate: true

  # Handled internally
  document:
    extensions: [".docx", ".rtf", ".odt"]
    processor: book-to-markdown
    delegate: true

  spreadsheet:
    extensions: [".csv", ".tsv", ".xlsx", ".xls", ".ods"]
    processor: convert-spreadsheet
    delegate: false

  presentation:
    extensions: [".pptx", ".ppt", ".odp", ".key"]
    processor: convert-presentation
    delegate: false

  image:
    extensions: [".png", ".jpg", ".jpeg", ".tiff", ".bmp", ".webp"]
    processor: convert-image-ocr
    delegate: false

  data:
    extensions: [".json", ".yaml", ".yml", ".xml", ".toml"]
    processor: convert-data-file
    delegate: false

  text:
    extensions: [".txt", ".md", ".rst", ".log"]
    processor: convert-text
    delegate: false

dependencies:
  squads:
    - name: media-processor
      path: squads/media-processor/
      purpose: "Process video and audio files"

    - name: book-to-markdown
      path: .aios/skills/book-to-markdown/
      purpose: "Convert PDF, EPUB, MOBI, DOCX to markdown"
      cli: "python3 .aios/skills/book-to-markdown/convert.py"

    # Purpose-driven delegation targets (optional — graceful degradation if missing)
    - name: squad-creator-pro
      path: squads/squad-creator-pro/
      purpose: "Extract knowledge, voice DNA, thinking DNA for squad building"
      optional: true

    - name: knowledge-base-builder
      path: squads/knowledge-base-builder/
      purpose: "Analyze content and extract concepts for knowledge bases"
      optional: true

    - name: mind-cloning
      path: squads/mind-cloning/
      purpose: "Clone communication style and decision patterns"
      optional: true

    - name: icp-cloning
      path: squads/icp-cloning/
      purpose: "Clone ideal customer profiles from content"
      optional: true

    - name: content-engine
      path: squads/content-engine/
      purpose: "Create content from extracted insights"
      optional: true

    - name: storytelling-masters-fosc
      path: squads/storytelling-masters-fosc/
      purpose: "Build narratives from extracted stories and metaphors"
      optional: true

  python_packages:
    - name: polars
      purpose: "CSV/Excel reading and transformation"
    - name: openpyxl
      purpose: "Excel .xlsx parsing with multiple sheets"
    - name: python-pptx
      purpose: "PowerPoint .pptx text and notes extraction"
    - name: pytesseract
      purpose: "OCR for images with text"
    - name: Pillow
      purpose: "Image processing for OCR prep"
    - name: langdetect
      purpose: "Automatic language detection"
    - name: pydantic
      purpose: "Frontmatter schema validation"
    - name: PyYAML
      purpose: "YAML frontmatter generation"
    - name: tabulate
      purpose: "Convert tabular data to markdown tables"

  system:
    - tesseract  # OCR engine (brew install tesseract)
