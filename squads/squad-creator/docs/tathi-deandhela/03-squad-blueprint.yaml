blueprint:
  meta:
    generated_at: "2026-02-25"
    owner: "squad-chief"
    status: "draft-v1"

  squad:
    pack_name: "tathi-deandhela"
    pack_title: "Tathi Deandhela Method Squad"
    slash_prefix: "tathi"
    version: "1.0.0"
    domain: "public_speaking"
    purpose: "Diagnose, structure, and optimize talks using Tathi Deandhela's teaching corpus."
    target_user: "Speakers, mentors, and content creators building memorable talks."

  architecture:
    entry_agent: "tathi-chief"
    agents:
      - id: "tathi-chief"
        tier: 0
        role: "Orchestrator and quality-gate controller"
      - id: "tathi-voice-dna"
        tier: 1
        role: "Voice and language style specialist"
      - id: "tathi-thinking-dna"
        tier: 1
        role: "Framework and decision heuristic specialist"
      - id: "tathi-talk-diagnostician"
        tier: 2
        role: "Talk assessment and gap analysis"
      - id: "tathi-stage-architect"
        tier: 2
        role: "Talk structure, persuasion, and narrative optimization"

  workflows:
    - id: "wf-talk-diagnostic"
      phases:
        - "input intake"
        - "diagnostic scoring"
        - "priority gaps"
        - "action plan"
      requires_veto_conditions: true
    - id: "wf-keynote-build"
      phases:
        - "goal and audience"
        - "narrative structure"
        - "persuasion blocks"
        - "rehearsal protocol"
      requires_veto_conditions: true
    - id: "wf-authority-content"
      phases:
        - "positioning"
        - "content mapping"
        - "distribution plan"
      requires_veto_conditions: true

  tasks:
    - "diagnose-current-talk"
    - "design-memorable-keynote"
    - "review-storyline-and-flow"
    - "optimize-persuasion-elements"
    - "build-speaker-authority-plan"

  quality_gates:
    source:
      min_citations: 15
      min_signature_phrases: 5
      trinity_required: true
    process:
      no_backward_flow: true
      checkpoints_blocking: true
      automation_guardrails_required: true

  source_policy:
    primary_tiers:
      - "Tier 0: transcription_clean.md"
      - "Tier 1: sculpt/masterpiece.md and paired artifacts"
    secondary_tiers:
      - "Tier 2: distill jsons"
      - "Tier 3: kb concepts"
    restrictions:
      - "Do not define core frameworks from Tier 3."
      - "Any inferred claim must be explicitly marked and validated."
