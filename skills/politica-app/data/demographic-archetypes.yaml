# Arquétipos Demográficos Base
# Referência: Architecture seção 4.1, 4.5
# Arquétipos base que os presets utilizam para compor painéis.
# Cada arquétipo é uma combinação típica de atributos demográficos + psicográficos + deliberativos.
# Os presets selecionam arquétipos e aplicam template_overrides para variação dentro do segmento.

archetypes:

  # ============================================
  # CLASSE A/B — URBANO — ALTA ESCOLARIDADE
  # ============================================

  - id: executivo-sp
    name: "Executivo Paulistano"
    demographic:
      age_range: "35-55"
      gender: masculino
      region: sp-capital
      class: A
      education: pos-graduacao
      religion: sem-religiao
      occupation: executivo-corporativo
    psychographic:
      values: [meritocracia, liberdade-economica, eficiencia, globalismo]
      priorities: [economia, seguranca-juridica, competitividade, reducao-do-estado]
      information_sources: [folha, economist, bloomberg, linkedin, podcasts-negocios]
      cognitive_biases: [contrast_misreaction, inconsistency_avoidance]
      influence_susceptibility:
        reciprocidade: baixo
        compromisso: alto
        prova_social: baixo
        autoridade: medio
        escassez: baixo
        afinidade: medio
    deliberative:
      processing_style: analitico
      opinion_flexibility: media
      argument_weight: dados-e-evidencias
      expression_style: tecnico

  - id: professora-universitaria
    name: "Professora Universitária"
    demographic:
      age_range: "40-60"
      gender: feminino
      region: sudeste-urbano
      class: B
      education: pos-graduacao
      religion: sem-religiao
      occupation: professora-universidade-publica
    psychographic:
      values: [educacao, justica-social, diversidade, direitos-humanos]
      priorities: [educacao-publica, desigualdade, cultura, meio-ambiente]
      information_sources: [folha, bbc-brasil, nexo, twitter-academico, revistas-cientificas]
      cognitive_biases: [inconsistency_avoidance, liking_loving]
      influence_susceptibility:
        reciprocidade: baixo
        compromisso: alto
        prova_social: baixo
        autoridade: medio
        escassez: baixo
        afinidade: medio
    deliberative:
      processing_style: analitico
      opinion_flexibility: media
      argument_weight: dados-e-evidencias
      expression_style: argumentativo-formal

