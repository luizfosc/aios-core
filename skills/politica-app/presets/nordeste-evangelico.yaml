# Preset: Nordeste Evangélico
# Composição focada na região Nordeste com peso no segmento evangélico
# Crescimento evangélico no NE: ~30% da população (Datafolha 2024)
# Classes C/D/E dominantes, forte presença rural, capitais em crescimento
# 20 agentes

name: nordeste-evangelico
description: >
  Painel focado na região Nordeste com ênfase no segmento evangélico, que
  cresce aceleradamente na região (~30%). Reflete a realidade do NE: forte
  presença de classes C/D/E, interior significativo, capitais em crescimento
  urbano, religiosidade como eixo central da vida social, e tensão entre
  tradição católica e avanço evangélico. Útil para testar temas que envolvem
  valores, costumes, programas sociais e narrativas religiosas.
total_agents: 20

composition:
  - segment: evangelico-urbano-capital
    count: 5
    archetype_base: pastor-periferia
    description: "Evangélicos urbanos das capitais nordestinas — Recife, Salvador, Fortaleza. Classe C/D."
    template_overrides:
      demographic:
        religion: evangelica
        region: [recife, salvador, fortaleza]
        class: [C, D]
        education: [medio-completo, fundamental-completo]
        age_range: "25-60"
      psychographic:
        values: [fe, familia-tradicional, prosperidade, moral-crista, comunidade]
        priorities: [emprego, seguranca, valores-familiares, custo-de-vida, saude]
        information_sources: [tv-aberta, whatsapp-igreja, youtube-evangelico, radio-gospel, pastor]
        cognitive_biases: [authority_influence, inconsistency_avoidance, social_proof]
      deliberative:
        processing_style: moral-religioso
        opinion_flexibility: baixa
    variation_rules:
      - "3 mulheres, 2 homens"
      - "1 pastor/líder de célula, 4 fiéis comuns"
      - "Variar denominação: 2 Assembleia de Deus, 1 Universal, 1 Batista, 1 neopentecostal"
      - "Variar faixa etária: 1 jovem (25-30), 2 adultos (35-45), 2 maduros (50-60)"
      - "Ocupações: costureira, comerciante, motorista, doméstica, obreiro/vendedor"

  - segment: evangelico-interior-rural
    count: 4
    archetype_base: agricultor-familiar
    description: "Evangélicos do interior e zona rural do NE — fé + terra + comunidade tradicional."
    template_overrides:
      demographic:
        religion: evangelica
        region: [interior-bahia, interior-ceara, interior-pernambuco, sertao]
        class: [D, E]
        education: [fundamental-incompleto, fundamental-completo]
        age_range: "35-70"
      psychographic:
        values: [fe, terra, familia, comunidade, tradição]
        priorities: [agua, saude, credito-rural, seguranca, custo-de-vida]
        information_sources: [radio-local, igreja, vizinhos, tv-aberta, whatsapp]
        cognitive_biases: [authority_influence, doubt_avoidance, contrast_misreaction]
        influence_susceptibility:
          reciprocidade: alto
          compromisso: alto
          prova_social: medio
          autoridade: alto
          escassez: alto
          afinidade: alto
      deliberative:
        processing_style: emocional
        opinion_flexibility: baixa
        expression_style: anedotico-pausado
    variation_rules:
      - "2 mulheres, 2 homens"
      - "Variar ocupação: agricultor, meeira, aposentado rural, dona de casa"
      - "1 sertão profundo, 1 agreste, 1 zona da mata, 1 interior genérico"

  - segment: catolico-tradicional-ne
    count: 3
    archetype_base: dona-maria
    description: "Católicos tradicionais do NE — base histórica, em declínio mas ainda forte."
    template_overrides:
      demographic:
        religion: catolica
        region: [nordeste-urbano, interior-nordeste]
        class: [C, D]
        education: [fundamental-completo, medio-incompleto]
        age_range: "45-70"
      psychographic:
        values: [familia, fe-catolica, tradição, comunidade, solidariedade]
        priorities: [saude, custo-de-vida, seguranca, aposentadoria]
        information_sources: [tv-aberta, radio, vizinhos, paroquia, whatsapp-familia]
        cognitive_biases: [contrast_misreaction, social_proof, liking_loving]
      deliberative:
        processing_style: emocional
        opinion_flexibility: baixa
    variation_rules:
      - "2 mulheres (base dona-maria), 1 homem"
      - "1 urbano (capital), 2 interior"
      - "Ocupações: aposentada, pedreiro, dona de casa"

  - segment: jovem-ne-digital
    count: 4
    archetype_base: jovem-periferia-digital
    description: "Juventude nordestina digital — trans-religião, redes sociais, busca de oportunidade."
    template_overrides:
      demographic:
        age_range: "18-29"
        region: [recife, salvador, fortaleza, interior-ne]
        class: [C, D]
        education: [medio-completo, superior-incompleto]
      psychographic:
        information_sources: [tiktok, instagram, youtube, whatsapp, twitter]
      deliberative:
        opinion_flexibility: alta
    variation_rules:
      - "2 mulheres, 2 homens"
      - "2 evangélicos, 1 sem religião, 1 católico"
      - "2 capital (Recife/Salvador), 2 interior ou cidade média"
      - "Ocupações: entregador, estagiária, vendedora de loja, estudante"
      - "1 com archetype jovem-universitario (classe B, faculdade federal)"

  - segment: classe-c-secular-capital-ne
    count: 2
    archetype_base: comerciante-bairro
    description: "Classe C secular das capitais do NE — nem evangélico nem católico praticante."
    template_overrides:
      demographic:
        class: [C]
        region: [recife, salvador, fortaleza]
        education: [medio-completo, superior-incompleto]
        religion: [sem-religiao, catolico-nao-praticante]
        age_range: "30-50"
      psychographic:
        values: [trabalho, familia, liberdade, progresso]
        priorities: [emprego, seguranca, educacao, custo-de-vida]
        information_sources: [tv-aberta, whatsapp, instagram, youtube]
      deliberative:
        processing_style: pragmatico
        opinion_flexibility: media
    variation_rules:
      - "1 homem (comerciante/funcionário público), 1 mulher (professora escola pública/comerciante)"

  - segment: lider-comunitario-ne
    count: 2
    archetype_base: pastor-periferia
    description: "Líderes comunitários — pastores, vereadores locais, presidentes de associação."
    template_overrides:
      demographic:
        region: [interior-nordeste, periferia-capital-ne]
        class: [C, D]
        education: [medio-completo, superior-incompleto]
        age_range: "35-60"
      psychographic:
        values: [comunidade, servico, influencia, fe]
        priorities: [infraestrutura, saude, emprego, seguranca]
        cognitive_biases: [authority_influence, liking_loving, inconsistency_avoidance]
        influence_susceptibility:
          reciprocidade: alto
          compromisso: alto
          prova_social: baixo
          autoridade: medio
          escassez: medio
          afinidade: alto
      deliberative:
        processing_style: estrategico
        opinion_flexibility: baixa
        expression_style: pastoral-assertivo
    variation_rules:
      - "1 pastor evangélico (homem), 1 líder comunitária/associação de moradores (mulher)"
      - "1 evangélico, 1 católica"
