<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: #09090B;
    color: #E4E4E7;
    line-height: 1.6;
  }

  /* ---- PAGE HEADER ---- */
  .page-header {
    text-align: center;
    padding: 60px 24px 40px;
    border-bottom: 1px solid #27272A;
  }
  .page-header h1 {
    font-size: 2.5rem;
    font-weight: 800;
    background: linear-gradient(135deg, #A855F7, #22D3EE);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  .page-header p { color: #71717A; font-size: 1.1rem; }
  .page-header .count { color: #A855F7; font-weight: 600; }

  /* ---- THEME GRID ---- */
  .themes-grid {
    max-width: 1400px;
    margin: 0 auto;
    padding: 40px 24px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
    gap: 32px;
  }

  /* ---- THEME CARD (outer wrapper) ---- */
  .theme-card {
    border-radius: 20px;
    overflow: hidden;
    border: 1px solid #27272A;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }
  .theme-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  /* ---- THEME HEADER ---- */
  .theme-header {
    padding: 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .theme-name { font-size: 1.2rem; font-weight: 700; }
  .theme-meta {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .theme-badge {
    font-size: 0.7rem;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 100px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .theme-font { font-size: 0.75rem; opacity: 0.6; }

  /* ---- COLOR PALETTE ROW ---- */
  .color-palette {
    display: flex;
    padding: 0 24px 16px;
    gap: 6px;
  }
  .color-swatch {
    flex: 1;
    height: 32px;
    border-radius: 8px;
    position: relative;
    cursor: pointer;
    transition: transform 0.15s;
  }
  .color-swatch:hover { transform: scaleY(1.3); }
  .color-swatch .tooltip {
    display: none;
    position: absolute;
    bottom: -28px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.65rem;
    background: #000;
    color: #fff;
    padding: 2px 8px;
    border-radius: 4px;
    white-space: nowrap;
    z-index: 10;
  }
  .color-swatch:hover .tooltip { display: block; }

  /* ---- SAMPLE COMPONENTS ---- */
  .sample-area {
    padding: 24px;
  }

  /* Mini hero */
  .mini-hero {
    padding: 32px 20px;
    border-radius: 12px;
    text-align: center;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }
  .mini-hero h2 {
    font-size: 1.3rem;
    font-weight: 800;
    margin-bottom: 4px;
    position: relative;
    z-index: 1;
  }
  .mini-hero .mini-subtitle {
    font-size: 0.85rem;
    opacity: 0.6;
    position: relative;
    z-index: 1;
  }
  .mini-hero .mini-badge {
    display: inline-block;
    font-size: 0.7rem;
    font-weight: 500;
    padding: 4px 14px;
    border-radius: 100px;
    margin-bottom: 12px;
    position: relative;
    z-index: 1;
  }

  /* Mini cards */
  .mini-cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 12px;
  }
  .mini-card {
    padding: 14px;
    border-radius: 10px;
    border-width: 1px;
    border-style: solid;
  }
  .mini-card h4 { font-size: 0.8rem; font-weight: 700; margin-bottom: 2px; }
  .mini-card p { font-size: 0.7rem; opacity: 0.6; margin: 0; }

  /* Mini stats */
  .mini-stats {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .mini-stat {
    flex: 1;
    text-align: center;
    padding: 12px 8px;
    border-radius: 10px;
    border-width: 1px;
    border-style: solid;
  }
  .mini-stat-value { font-size: 1.2rem; font-weight: 800; }
  .mini-stat-label { font-size: 0.65rem; opacity: 0.6; }

  /* Mini callout */
  .mini-callout {
    border-left-width: 3px;
    border-left-style: solid;
    border-radius: 0 8px 8px 0;
    padding: 10px 14px;
    font-size: 0.75rem;
    margin-bottom: 12px;
  }

  /* Mini table */
  .mini-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.72rem;
    margin-bottom: 12px;
    border-radius: 8px;
    overflow: hidden;
  }
  .mini-table th {
    text-align: left;
    padding: 8px 10px;
    font-weight: 600;
    border-bottom-width: 2px;
    border-bottom-style: solid;
  }
  .mini-table td {
    padding: 6px 10px;
    border-bottom-width: 1px;
    border-bottom-style: solid;
  }

  /* Mini buttons row */
  .mini-buttons {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .mini-btn {
    flex: 1;
    padding: 8px 0;
    border-radius: 8px;
    font-size: 0.75rem;
    font-weight: 600;
    text-align: center;
    border: none;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .mini-btn:hover { opacity: 0.85; }
  .mini-btn-outline {
    background: transparent;
    border-width: 1px;
    border-style: solid;
  }

  /* Mini code block */
  .mini-code {
    padding: 10px 14px;
    border-radius: 8px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 0.7rem;
    line-height: 1.5;
    overflow-x: auto;
    border-width: 1px;
    border-style: solid;
  }

  /* ---- CLI SNIPPET ---- */
  .cli-snippet {
    background: #18181B;
    border-top: 1px solid #27272A;
    padding: 14px 24px;
    font-family: 'SF Mono', monospace;
    font-size: 0.72rem;
    color: #71717A;
    display: flex;
    align-items: center;
    justify-content: space-between;

  .cli-snippet code { color: #A8A29E; }

  .copy-btn {
    background: #27272A;
    border: none;
    color: #A8A29E;
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.7rem;
    transition: background 0.2s;
  }
  .copy-btn:hover { background: #3F3F46; }

  /* ---- FOOTER ---- */
  .page-footer {
    text-align: center;
    padding: 40px 24px;
    border-top: 1px solid #27272A;
    color: #52525B;
    font-size: 0.85rem;
  }
